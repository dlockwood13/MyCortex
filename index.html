{ "id":"machiavelli","discipline":"Philosophy","name":"Niccolò Machiavelli","dates":"1469–1527","role":"Florentine diplomat & founder of modern political science","nutshell":"Politics runs on different rules than private morality — and pretending otherwise gets people killed.","featured":true,
"profile":"<p>Niccolò Machiavelli was a Florentine diplomat, political theorist and writer whose name became a byword for cunning — often unfairly so.</p><h3>Life and context</h3><p>He worked as a senior official in the Republic of Florence for fourteen years. When the Medici returned in 1512 he was dismissed, imprisoned and tortured, then wrote in rural exile. His most famous book was partly a job application to the Medici.</p><h3>The Prince (1513)</h3><ul><li><strong>Realism over idealism.</strong> He described how politics actually behaves, not how it should.</li><li><strong>Virtù vs fortuna.</strong> Skill and boldness against luck and circumstance.</li><li><strong>Ends and means.</strong> A ruler must act immorally when the state's survival demands it.</li><li><strong>Feared vs loved.</strong> If you cannot be both, being feared is safer, provided you avoid being hated.</li></ul><h3>The Discourses on Livy</h3><p>His deeper, republican work, admiring Rome, civic participation and the rule of law. He likely preferred republics but wrote The Prince for the world as he found it.</p><div class=\"callout\">In forensic terms, Machiavellianism survives as one leg of the <strong>Dark Triad</strong> (with narcissism and psychopathy), a manipulative, strategic interpersonal style measured by scales like the MACH-IV.</div>" },
{ "id":"heraclitus","discipline":"Philosophy","name":"Heraclitus","dates":"c. 535–475 BCE","role":"Pre-Socratic philosopher of flux","nutshell":"Everything flows; the only constant is change.","featured":false,
"profile":"<h3>Context</h3><p>An aristocratic, famously obscure thinker from Ephesus, nicknamed the weeping philosopher.</p><h3>Key ideas</h3><ul><li><strong>Flux.</strong> You cannot step into the same river twice.</li><li><strong>Unity of opposites.</strong> Tension between opposites holds the world together.</li><li><strong>Logos.</strong> A hidden rational order underlies apparent chaos.</li></ul><h3>Why he matters</h3><p>He set the agenda for Western metaphysics; his process view echoes through Hegel, Nietzsche and modern systems thinking.</p>" },
{ "id":"plato","discipline":"Philosophy","name":"Plato","dates":"c. 428–348 BCE","role":"Athenian founder of the Academy","nutshell":"The world we see is just shadows; reality is the perfect Forms behind it.","featured":false,
"profile":"<h3>Context</h3><p>Student of Socrates and teacher of Aristotle, Plato founded the Academy and wrote in dialogues.</p><h3>Key ideas</h3><ul><li><strong>Theory of Forms.</strong> Perfect, eternal Forms behind imperfect copies.</li><li><strong>The Cave.</strong> Most mistake shadows for reality.</li><li><strong>Tripartite soul.</strong> Reason, spirit and appetite in balance.</li><li><strong>Philosopher-kings.</strong> Rule by those who know the Good.</li></ul><h3>Why he matters</h3><p>He founded systematic epistemology, political philosophy and the soul-as-structure idea behind later personality psychology.</p>" },
{ "id":"aristotle","discipline":"Philosophy","name":"Aristotle","dates":"384–322 BCE","role":"Polymath, founder of formal logic","nutshell":"Virtue is a habit, found in the mean between extremes.","featured":false,
"profile":"<h3>Context</h3><p>Plato's most famous student and tutor to Alexander, Aristotle studied the actual world.</p><h3>Key ideas</h3><ul><li><strong>Empiricism.</strong> Knowledge begins in observation.</li><li><strong>Four causes.</strong> Material, formal, efficient and final.</li><li><strong>Virtue ethics and the golden mean.</strong> Courage between cowardice and recklessness.</li><li><strong>Eudaimonia.</strong> Flourishing through reason and virtue.</li></ul><h3>Why he matters</h3><p>He invented formal logic and his virtue ethics underpins character-based approaches to morality and rehabilitation.</p>" },
{ "id":"augustine","discipline":"Philosophy","name":"St Augustine of Hippo","dates":"354–430","role":"Christian theologian & philosopher","nutshell":"We are restless until we rest in God — and we are broken from the start.","featured":false,
"profile":"<h3>Context</h3><p>A North African bishop whose Confessions is one of the first works of psychological self-examination.</p><h3>Key ideas</h3><ul><li><strong>Original sin.</strong> Human nature is flawed and self-divided.</li><li><strong>Free will and grace.</strong> Evil is a privation; only grace heals the disordered will.</li><li><strong>Inner life.</strong> Truth found by turning inward.</li><li><strong>Just war.</strong> An early framework for legitimate state violence.</li></ul><h3>Why he matters</h3><p>His analysis of guilt and a divided self prefigures depth psychology.</p>" },
{ "id":"descartes","discipline":"Philosophy","name":"René Descartes","dates":"1596–1650","role":"French rationalist, father of modern philosophy","nutshell":"I think, therefore I am — the one thing doubt cannot dissolve.","featured":false,
"profile":"<h3>Context</h3><p>A French mathematician and philosopher who rebuilt knowledge on certain foundations and founded analytic geometry.</p><h3>Key ideas</h3><ul><li><strong>Methodic doubt.</strong> Doubt everything that can be doubted.</li><li><strong>Cogito.</strong> Doubting proves a thinking self exists.</li><li><strong>Mind-body dualism.</strong> Mind and body as distinct substances.</li><li><strong>Rationalism.</strong> Reason as the surest source of knowledge.</li></ul><h3>Why he matters</h3><p>He set the agenda for modern epistemology and the mind-body problem in consciousness research.</p>" },
{ "id":"locke","discipline":"Philosophy","name":"John Locke","dates":"1632–1704","role":"English empiricist & political theorist","nutshell":"The mind starts as a blank slate; government rests on consent.","featured":false,
"profile":"<h3>Context</h3><p>An English physician and philosopher, founder of empiricism and liberal political thought.</p><h3>Key ideas</h3><ul><li><strong>Tabula rasa.</strong> The mind is a blank slate; knowledge comes from experience.</li><li><strong>Empiricism.</strong> Built from simple ideas combined by the mind.</li><li><strong>Natural rights.</strong> Life, liberty and property.</li><li><strong>Social contract.</strong> Authority from the consent of the governed.</li></ul><h3>Why he matters</h3><p>The blank-slate view is foundational to nature-vs-nurture debates; his rights framework underpins liberal democracy.</p>" },
{ "id":"hume","discipline":"Philosophy","name":"David Hume","dates":"1711–1776","role":"Scottish empiricist & sceptic","nutshell":"You cannot derive an 'ought' from an 'is' — and reason is the slave of the passions.","featured":false,
"profile":"<h3>Context</h3><p>The leading figure of the Scottish Enlightenment, pushing empiricism to its sceptical limits.</p><h3>Key ideas</h3><ul><li><strong>Problem of induction.</strong> We cannot rationally justify expecting the future to resemble the past.</li><li><strong>Cause and effect.</strong> We observe only constant conjunction.</li><li><strong>Is-ought gap.</strong> Facts do not entail moral conclusions.</li><li><strong>Sentiment in morality.</strong> Moral judgements rest on feeling.</li></ul><h3>Why he matters</h3><p>His scepticism woke Kant, and his emphasis on emotion anticipates modern moral psychology.</p>" },
{ "id":"kant","discipline":"Philosophy","name":"Immanuel Kant","dates":"1724–1804","role":"German idealist, author of the Critiques","nutshell":"Act only on rules you could will everyone to follow.","featured":false,
"profile":"<h3>Context</h3><p>A methodical Prussian professor who tried to reconcile rationalism and empiricism.</p><h3>Key ideas</h3><ul><li><strong>The Copernican turn.</strong> The mind structures experience; we know phenomena, not things in themselves.</li><li><strong>Categorical imperative.</strong> Act on a maxim you could will universal; treat people as ends.</li><li><strong>Deontology.</strong> Morality is about duty, not consequences.</li><li><strong>Autonomy and dignity.</strong> Rational agents legislate the moral law.</li></ul><h3>Why he matters</h3><p>He frames the great alternative to utilitarianism, a tension running through punishment and bioethics.</p>" },
{ "id":"wollstonecraft","discipline":"Philosophy","name":"Mary Wollstonecraft","dates":"1759–1797","role":"English Enlightenment feminist","nutshell":"Women only seem irrational because they have been denied an education.","featured":false,
"profile":"<h3>Context</h3><p>An English writer and radical who argued for women's rationality and rights.</p><h3>Key ideas</h3><ul><li><strong>Vindication of the Rights of Woman.</strong> Women appear inferior only through deprived education.</li><li><strong>Reason and virtue.</strong> Both sexes share the same rational capacity.</li><li><strong>Education.</strong> Equality requires educating women as rational beings.</li></ul><h3>Why she matters</h3><p>A founding figure of liberal feminism, extending Enlightenment reason and rights to women.</p>" },
{ "id":"mill","discipline":"Philosophy","name":"John Stuart Mill","dates":"1806–1873","role":"English utilitarian & liberal","nutshell":"Maximise happiness — but your freedom ends where you harm others.","featured":false,
"profile":"<h3>Context</h3><p>A child prodigy who humanised utilitarianism and became Victorian Britain's great theorist of liberty.</p><h3>Key ideas</h3><ul><li><strong>Utilitarianism.</strong> The right action maximises happiness, with higher and lower pleasures.</li><li><strong>Harm principle.</strong> Liberty may be limited only to prevent harm to others.</li><li><strong>On Liberty.</strong> Free thought and individuality against the tyranny of the majority.</li><li><strong>Early feminism.</strong> The Subjection of Women argued for equality.</li></ul><h3>Why he matters</h3><p>The harm principle is a cornerstone of liberal law and debates on criminalisation.</p>" },
{ "id":"kierkegaard","discipline":"Philosophy","name":"Søren Kierkegaard","dates":"1813–1855","role":"Danish father of existentialism","nutshell":"Truth is subjective; faith is a leap you make in fear and trembling.","featured":false,
"profile":"<h3>Context</h3><p>A melancholic Danish writer who attacked abstract systems and complacent Christianity.</p><h3>Key ideas</h3><ul><li><strong>The individual.</strong> Philosophy must start from the existing, choosing individual.</li><li><strong>Subjectivity.</strong> What matters is how passionately one lives a commitment.</li><li><strong>Stages of life.</strong> Aesthetic, ethical and religious.</li><li><strong>Anxiety and the leap.</strong> Freedom brings dread; faith leaps beyond reason.</li></ul><h3>Why he matters</h3><p>He founded existentialism and gave psychology its vocabulary of anxiety and authenticity.</p>" },
{ "id":"marx","discipline":"Philosophy","name":"Karl Marx","dates":"1818–1883","role":"German philosopher of history & economy","nutshell":"History is driven by class struggle, and capitalism alienates us from our own work.","featured":false,
"profile":"<h3>Context</h3><p>A German philosopher, economist and revolutionary whose critique of capitalism became hugely consequential.</p><h3>Key ideas</h3><ul><li><strong>Historical materialism.</strong> Material conditions drive historical change.</li><li><strong>Class struggle.</strong> Conflict between owners and workers.</li><li><strong>Alienation.</strong> Workers estranged from labour and themselves.</li><li><strong>Ideology.</strong> Dominant ideas serve the ruling class.</li></ul><h3>Why he matters</h3><p>His structural view of power underpins critical criminology.</p>" },
{ "id":"nietzsche","discipline":"Philosophy","name":"Friedrich Nietzsche","dates":"1844–1900","role":"German philosopher of value & the will","nutshell":"God is dead — now create your own values instead of inheriting them.","featured":false,
"profile":"<h3>Context</h3><p>A German philologist turned philosopher who diagnosed the coming crisis of meaning in a secular age.</p><h3>Key ideas</h3><ul><li><strong>God is dead.</strong> The collapse of religious authority risks nihilism.</li><li><strong>Master and slave morality.</strong> Conventional morality grew from resentment.</li><li><strong>Will to power.</strong> Life as a striving to grow and create.</li><li><strong>Übermensch and eternal recurrence.</strong> Create your own values and affirm life.</li></ul><h3>Why he matters</h3><p>He shaped existentialism, psychoanalysis and postmodern thought.</p>" },
{ "id":"saussure","discipline":"Philosophy","name":"Ferdinand de Saussure","dates":"1857–1913","role":"Swiss founder of structural linguistics","nutshell":"Words mean what they mean only by differing from other words.","featured":false,
"profile":"<h3>Context</h3><p>A Swiss linguist whose posthumous Course in General Linguistics founded structuralism.</p><h3>Key ideas</h3><ul><li><strong>The sign.</strong> Signifier and signified, arbitrarily linked.</li><li><strong>Meaning by difference.</strong> Signs mean through difference within a system.</li><li><strong>Langue vs parole.</strong> The system versus individual speech.</li><li><strong>Synchrony.</strong> Study language as a system at a moment in time.</li></ul><h3>Why he matters</h3><p>Structuralism reshaped anthropology, literary theory and psychology via Lacan.</p>" },
{ "id":"wittgenstein","discipline":"Philosophy","name":"Ludwig Wittgenstein","dates":"1889–1951","role":"Austrian-British philosopher of language","nutshell":"The meaning of a word is its use — and most philosophy is confusion about language.","featured":false,
"profile":"<h3>Context</h3><p>A Viennese millionaire who gave away his fortune and produced two philosophies that each reshaped the field.</p><h3>Key ideas</h3><ul><li><strong>Early (Tractatus).</strong> Language pictures facts; the limits of language are the limits of the world.</li><li><strong>Later (Investigations).</strong> Meaning is use within language games and forms of life.</li><li><strong>Philosophy as therapy.</strong> Many problems are confusions of language.</li><li><strong>Private language argument.</strong> Meaning is inherently social.</li></ul><h3>Why he matters</h3><p>His meaning-as-use influences how we think about concepts, rules and psychiatric categories.</p>" },
{ "id":"beauvoir","discipline":"Philosophy","name":"Simone de Beauvoir","dates":"1908–1986","role":"French existentialist & feminist","nutshell":"One is not born, but rather becomes, a woman.","featured":false,
"profile":"<h3>Context</h3><p>A French philosopher and central figure of existentialism who applied it to the situation of women.</p><h3>Key ideas</h3><ul><li><strong>The Second Sex.</strong> Gender is a social construction, not a fixed essence.</li><li><strong>Woman as the Other.</strong> Man as norm, woman as deviation.</li><li><strong>Ethics of ambiguity.</strong> We are radically free yet situated.</li></ul><h3>Why she matters</h3><p>She laid the groundwork for second-wave feminism and the sex/gender distinction.</p>" },
{ "id":"hegel","discipline":"Philosophy","name":"G. W. F. Hegel","dates":"1770–1831","role":"German idealist of dialectic & history","nutshell":"History is the slow march of Spirit toward freedom, driven by contradiction.","featured":false,
"profile":"<h3>Context</h3><p>A towering and difficult German idealist who built one of philosophy's most ambitious systems.</p><h3>Key ideas</h3><ul><li><strong>The dialectic.</strong> Thought advances through clash and resolution of opposites.</li><li><strong>Geist (Spirit).</strong> Reality as the self-development of a rational Spirit toward freedom.</li><li><strong>Master-slave dialectic.</strong> Self-consciousness arises through recognition.</li><li><strong>History as progress.</strong> The rational progress of freedom.</li></ul><h3>Forensic relevance</h3><p>His theory of punishment as the restoration of right is a classic statement of retributive justice.</p>" },
{ "id":"schopenhauer","discipline":"Philosophy","name":"Arthur Schopenhauer","dates":"1788–1860","role":"Philosopher of the Will & pessimism","nutshell":"Life is driven by a blind, insatiable Will — which is exactly why we suffer.","featured":false,
"profile":"<h3>Context</h3><p>The great pessimist of Western philosophy, a decisive influence on Nietzsche, Freud and Tolstoy.</p><h3>Key ideas</h3><ul><li><strong>World as Will and Representation.</strong> A single blind, striving force behind appearances.</li><li><strong>Suffering.</strong> The insatiable Will breeds suffering.</li><li><strong>Escape through art and compassion.</strong> Temporary release from willing.</li></ul><h3>Why he matters</h3><p>He anticipated depth psychology's view of human beings driven by forces beneath awareness.</p>" },
{ "id":"hobbes","discipline":"Philosophy","name":"Thomas Hobbes","dates":"1588–1679","role":"English theorist of the social contract","nutshell":"Without a strong state, life is a war of all against all.","featured":false,
"profile":"<h3>Context</h3><p>Writing during the English Civil War, Hobbes produced in Leviathan the first great modern theory of political authority.</p><h3>Key ideas</h3><ul><li><strong>State of nature.</strong> Life solitary, poor, nasty, brutish and short.</li><li><strong>Social contract.</strong> People surrender freedom to a sovereign for security.</li><li><strong>Absolute sovereignty.</strong> Order requires undivided authority.</li><li><strong>Materialism.</strong> Humans as matter in motion.</li></ul><h3>Forensic relevance</h3><p>He supplies the rationale for law and the state's monopoly on legitimate violence.</p>" },
{ "id":"rousseau","discipline":"Philosophy","name":"Jean-Jacques Rousseau","dates":"1712–1778","role":"Genevan theorist of freedom & the general will","nutshell":"We are born good and free; society corrupts and enchains us.","featured":false,
"profile":"<h3>Context</h3><p>A Genevan philosopher whose ideas helped ignite the French Revolution and Romanticism.</p><h3>Key ideas</h3><ul><li><strong>Natural goodness.</strong> Humans are naturally good and corrupted by society.</li><li><strong>The Social Contract.</strong> Man is born free, and everywhere he is in chains.</li><li><strong>General will.</strong> Freedom is obeying laws we give ourselves.</li><li><strong>Education (Emile).</strong> Follow the child's nature.</li></ul><h3>Forensic relevance</h3><p>He anchors the optimistic tradition: people remain reformable.</p>" },
{ "id":"spinoza","discipline":"Philosophy","name":"Baruch Spinoza","dates":"1632–1677","role":"Dutch rationalist of substance & freedom","nutshell":"God and Nature are one, and freedom is understanding necessity.","featured":false,
"profile":"<h3>Context</h3><p>A Dutch-Jewish lens-grinder excommunicated for his radical views, later revered by Einstein.</p><h3>Key ideas</h3><ul><li><strong>Substance monism.</strong> One infinite substance, God or Nature.</li><li><strong>Determinism.</strong> Everything follows necessarily; free will is an illusion.</li><li><strong>Freedom as understanding.</strong> Acting from reason rather than passion.</li></ul><h3>Forensic relevance</h3><p>His determinism challenges moral responsibility; mastering passions through understanding prefigures cognitive approaches.</p>" },
{ "id":"husserl","discipline":"Philosophy","name":"Edmund Husserl","dates":"1859–1938","role":"Founder of phenomenology","nutshell":"Study consciousness as it actually shows up — and bracket your assumptions.","featured":false,
"profile":"<h3>Context</h3><p>A German philosopher and mathematician who founded phenomenology, the seedbed for Heidegger and Sartre.</p><h3>Key ideas</h3><ul><li><strong>To the things themselves.</strong> Describe experience as lived.</li><li><strong>Intentionality.</strong> Consciousness is always of something.</li><li><strong>The epoché.</strong> Bracket assumptions to examine pure experience.</li><li><strong>The lifeworld.</strong> The world underlying all science.</li></ul><h3>Why he matters</h3><p>Phenomenology underpins qualitative methods such as IPA.</p>" },
{ "id":"heidegger","discipline":"Philosophy","name":"Martin Heidegger","dates":"1889–1976","role":"Philosopher of Being & existence","nutshell":"Asked the question everyone forgot — what does it actually mean 'to be'?","featured":false,
"profile":"<h3>Context</h3><p>Husserl's student and one of the most influential and controversial philosophers of the 20th century.</p><h3>Key ideas</h3><ul><li><strong>The question of Being.</strong> What does it mean for anything to be?</li><li><strong>Dasein.</strong> Human existence as being-there, thrown into a world.</li><li><strong>Being-in-the-world.</strong> Always practically engaged, not detached minds.</li><li><strong>Being-toward-death.</strong> Facing finitude as the route to authenticity.</li></ul><h3>Why he matters</h3><p>He shaped existentialism and hermeneutics. His Nazi party membership remains a serious, unresolved stain on his legacy.</p>" },
{ "id":"sartre","discipline":"Philosophy","name":"Jean-Paul Sartre","dates":"1905–1980","role":"Leading existentialist of radical freedom","nutshell":"We are condemned to be free — and wholly responsible for what we make of ourselves.","featured":false,
"profile":"<h3>Context</h3><p>A French philosopher and public intellectual who made existentialism a cultural movement.</p><h3>Key ideas</h3><ul><li><strong>Existence precedes essence.</strong> We define ourselves through choices.</li><li><strong>Radical freedom.</strong> Condemned to be free and fully responsible.</li><li><strong>Bad faith.</strong> Fleeing freedom by pretending we have no choice.</li><li><strong>The Look.</strong> Others' gaze can reduce us to an object.</li></ul><h3>Forensic relevance</h3><p>His analysis of choice, responsibility and self-deception speaks to agency and minimisation in offending.</p>" },
{ "id":"merleau-ponty","discipline":"Philosophy","name":"Maurice Merleau-Ponty","dates":"1908–1961","role":"Phenomenologist of the body & perception","nutshell":"You do not have a body — you are your body, and you think through it.","featured":false,
"profile":"<h3>Context</h3><p>A French phenomenologist who corrected the disembodied bias of much philosophy.</p><h3>Key ideas</h3><ul><li><strong>The lived body.</strong> We experience the world through a body that is subject.</li><li><strong>Primacy of perception.</strong> The pre-reflective basis of all knowledge.</li><li><strong>Against dualism.</strong> Mind and world are intertwined.</li></ul><h3>Why he matters</h3><p>His embodied account anticipates today's embodied-mind research.</p>" },
{ "id":"peirce","discipline":"Philosophy","name":"Charles Sanders Peirce","dates":"1839–1914","role":"Founder of pragmatism & semiotics","nutshell":"The meaning of an idea is the sum of its practical effects.","featured":false,
"profile":"<h3>Context</h3><p>An American polymath and logician, now recognised as profoundly original.</p><h3>Key ideas</h3><ul><li><strong>Pragmatic maxim.</strong> Grasp meaning through practical consequences.</li><li><strong>Semiotics.</strong> A theory of signs: icon, index, symbol.</li><li><strong>Fallibilism.</strong> All knowledge is provisional.</li><li><strong>Abduction.</strong> Reasoning to the best explanation.</li></ul><h3>Forensic relevance</h3><p>Abduction is the logic of investigation, diagnosis and formulation.</p>" },
{ "id":"popper","discipline":"Philosophy","name":"Karl Popper","dates":"1902–1994","role":"Philosopher of science & the open society","nutshell":"A theory is scientific only if it can be proven wrong.","featured":false,
"profile":"<h3>Context</h3><p>An Austrian-British philosopher who transformed the philosophy of science.</p><h3>Key ideas</h3><ul><li><strong>Falsifiability.</strong> Science makes risky predictions that could be refuted.</li><li><strong>Conjectures and refutations.</strong> Knowledge grows by bold guesses ruthlessly tested.</li><li><strong>Critique of induction.</strong> We never prove a theory true.</li><li><strong>The Open Society.</strong> A defence of liberal democracy.</li></ul><h3>Forensic relevance</h3><p>Falsifiability is the working standard for admissible expert evidence and telling science from pseudoscience.</p>" },
{ "id":"foucault","discipline":"Philosophy","name":"Michel Foucault","dates":"1926–1984","role":"Theorist of power, knowledge & the prison","nutshell":"Prisons, clinics and schools do not just judge us — they produce us.","featured":false,
"profile":"<h3>Context</h3><p>A French philosopher and historian who analysed how power operates through knowledge and institutions.</p><h3>Key ideas</h3><ul><li><strong>Power/knowledge.</strong> What counts as truth is bound up with control.</li><li><strong>Discipline and Punish.</strong> From bodily spectacle to surveillance and correction.</li><li><strong>The Panopticon.</strong> Constant possible observation makes prisoners police themselves.</li><li><strong>The human sciences.</strong> Psychiatry and criminology classify and manage populations.</li></ul><h3>Forensic relevance</h3><p>Essential and unsettling reading on the prison, psychiatric power, risk and surveillance.</p>" },
{ "id":"newton","discipline":"Philosophy","name":"Isaac Newton","dates":"1642–1727","role":"Natural philosopher of motion & gravitation","nutshell":"Turned the cosmos into mathematics — and the universe into a machine.","featured":false,
"profile":"<h3>Context</h3><p>A natural philosopher whose Principia reshaped how the Enlightenment thought about knowledge.</p><h3>Key ideas</h3><ul><li><strong>Laws of motion and gravitation.</strong> One framework for apples and planets.</li><li><strong>The mechanical universe.</strong> Nature as a law-governed system.</li><li><strong>Method.</strong> Knowledge from evidence and inference, not authority.</li></ul><h3>Why he matters</h3><p>The Newtonian ideal of lawful, measurable nature set the template every later science aspired to.</p>" },
{ "id":"wundt","discipline":"Psychology","name":"Wilhelm Wundt","dates":"1832–1920","role":"Founder of experimental psychology","nutshell":"Opened the first psychology lab and made the mind a thing you could measure.","featured":false,
"profile":"<h3>Context</h3><p>A German physiologist who in 1879 opened the first psychology laboratory in Leipzig.</p><h3>Key ideas</h3><ul><li><strong>Experimental introspection.</strong> Trained observers report immediate experience.</li><li><strong>Structuralism.</strong> Break experience into basic elements.</li><li><strong>Voluntarism.</strong> The mind actively organises through attention and will.</li></ul><h3>Why he matters</h3><p>He separated psychology from philosophy and established the experiment as its core method.</p>" },
{ "id":"james","discipline":"Psychology","name":"William James","dates":"1842–1910","role":"Father of American psychology","nutshell":"Do not dissect consciousness into parts — ask what it is for.","featured":false,
"profile":"<h3>Context</h3><p>An American philosopher-psychologist whose Principles of Psychology defined the field.</p><h3>Key ideas</h3><ul><li><strong>Functionalism.</strong> Ask what mental processes do for the organism.</li><li><strong>Stream of consciousness.</strong> Experience as a continuous flow.</li><li><strong>Pragmatism.</strong> Truth lies in practical consequences.</li><li><strong>James-Lange theory.</strong> Emotion follows bodily response.</li></ul><h3>Why he matters</h3><p>Functionalism paved the way for applied, evolutionary and behavioural psychology.</p>" },
{ "id":"freud","discipline":"Psychology","name":"Sigmund Freud","dates":"1856–1939","role":"Founder of psychoanalysis","nutshell":"Most of the mind is underwater, and it is mostly about what you are repressing.","featured":false,
"profile":"<h3>Context</h3><p>A Viennese neurologist who founded psychoanalysis. Hugely influential and hugely contested.</p><h3>Key ideas</h3><ul><li><strong>The unconscious.</strong> Much of mental life is inaccessible yet shapes behaviour.</li><li><strong>Id, ego, superego.</strong> Drives, the reality-testing self and the moral authority.</li><li><strong>Defence mechanisms.</strong> Repression, denial, projection.</li><li><strong>Psychosexual stages.</strong> Childhood conflicts mark personality.</li></ul><h3>Forensic relevance</h3><p>Unconscious conflict and defence persist in psychodynamic formulation, though criticised as unfalsifiable.</p>" },
{ "id":"jung","discipline":"Psychology","name":"Carl Jung","dates":"1875–1961","role":"Founder of analytical psychology","nutshell":"Beneath your personal unconscious lies a shared reservoir of human symbols.","featured":false,
"profile":"<h3>Context</h3><p>A Swiss psychiatrist, once Freud's heir apparent, who founded his own school.</p><h3>Key ideas</h3><ul><li><strong>Collective unconscious.</strong> A shared layer populated by archetypes.</li><li><strong>Individuation.</strong> Integrating the psyche into a whole self.</li><li><strong>Psychological types.</strong> Introversion/extraversion, later inspiring MBTI.</li><li><strong>The Shadow.</strong> The disowned darker side of the self.</li></ul><h3>Why he matters</h3><p>He shaped psychotherapy and the cultural study of myth and symbol.</p>" },
{ "id":"pavlov","discipline":"Psychology","name":"Ivan Pavlov","dates":"1849–1936","role":"Pioneer of classical conditioning","nutshell":"Ring a bell with dinner enough times and the bell alone makes you drool.","featured":false,
"profile":"<h3>Context</h3><p>A Russian physiologist who won a Nobel Prize for work on digestion, then discovered conditioning.</p><h3>Key ideas</h3><ul><li><strong>Classical conditioning.</strong> A neutral stimulus paired with one that triggers a response comes to trigger it alone.</li><li><strong>Conditioned vs unconditioned.</strong> The UCS, UCR, CS, CR vocabulary.</li><li><strong>Extinction and generalisation.</strong> Associations fade and spread.</li></ul><h3>Why he matters</h3><p>Classical conditioning underlies behavioural accounts of phobias, addiction cues and aversion therapy.</p>" },
{ "id":"watson","discipline":"Psychology","name":"John B. Watson","dates":"1878–1958","role":"Founder of behaviourism","nutshell":"Forget the mind — give me a dozen infants and I will shape any of them.","featured":false,
"profile":"<h3>Context</h3><p>An American psychologist who launched behaviourism, studying only observable behaviour.</p><h3>Key ideas</h3><ul><li><strong>Behaviourism.</strong> Psychology is the science of behaviour.</li><li><strong>Environmental determinism.</strong> His boast about training any infant.</li><li><strong>Little Albert.</strong> Conditioned fear in an infant, now infamous on ethical grounds.</li></ul><h3>Why he matters</h3><p>He set the agenda for learning research; his methods became a cautionary tale in ethics.</p>" },
{ "id":"skinner","discipline":"Psychology","name":"B. F. Skinner","dates":"1904–1990","role":"Architect of radical behaviourism","nutshell":"Behaviour is shaped by its consequences — reward it and you get more of it.","featured":false,
"profile":"<h3>Context</h3><p>The most influential behaviourist, studying how consequences shape behaviour with the Skinner box.</p><h3>Key ideas</h3><ul><li><strong>Operant conditioning.</strong> Reinforcement strengthens, punishment weakens.</li><li><strong>Schedules of reinforcement.</strong> Variable reinforcement is most persistent.</li><li><strong>Shaping.</strong> Building behaviour by successive approximations.</li><li><strong>Radical behaviourism.</strong> Even private events are governed by contingencies.</li></ul><h3>Forensic relevance</h3><p>Operant principles underpin token economies and offender behaviour programmes.</p>" },
{ "id":"maslow","discipline":"Psychology","name":"Abraham Maslow","dates":"1908–1970","role":"Founder of humanistic psychology","nutshell":"You cannot chase self-fulfilment on an empty stomach.","featured":false,
"profile":"<h3>Context</h3><p>An American psychologist who studied healthy growth and human potential.</p><h3>Key ideas</h3><ul><li><strong>Hierarchy of needs.</strong> Physiological, safety, belonging, esteem, self-actualisation.</li><li><strong>Self-actualisation.</strong> Fulfilling one's unique potential.</li><li><strong>Peak experiences.</strong> Moments of intense joy and meaning.</li></ul><h3>Why he matters</h3><p>The needs framework echoes in strengths-based rehabilitation like the Good Lives Model.</p>" },
{ "id":"rogers","discipline":"Psychology","name":"Carl Rogers","dates":"1902–1987","role":"Founder of person-centred therapy","nutshell":"People heal themselves when they feel genuinely accepted.","featured":false,
"profile":"<h3>Context</h3><p>The leading humanistic therapist, placing the client's own experience at the centre.</p><h3>Key ideas</h3><ul><li><strong>Actualising tendency.</strong> An innate drive toward growth.</li><li><strong>Core conditions.</strong> Unconditional positive regard, empathy and congruence.</li><li><strong>Self-concept.</strong> Distress from a gap between actual and ideal self.</li><li><strong>Client-centred stance.</strong> The therapist as facilitator.</li></ul><h3>Why he matters</h3><p>His core conditions underpin the therapeutic alliance, a strong predictor of outcome.</p>" },
{ "id":"piaget","discipline":"Psychology","name":"Jean Piaget","dates":"1896–1980","role":"Pioneer of cognitive development","nutshell":"Children are not dumb adults — they think in qualitatively different stages.","featured":false,
"profile":"<h3>Context</h3><p>A Swiss psychologist who built the first major theory of how thinking develops.</p><h3>Key ideas</h3><ul><li><strong>Stages.</strong> Sensorimotor, preoperational, concrete and formal operational.</li><li><strong>Schemas.</strong> Mental frameworks children build and revise.</li><li><strong>Assimilation and accommodation.</strong> Fitting experience to schemas, or changing them.</li><li><strong>Constructivism.</strong> Children actively construct knowledge.</li></ul><h3>Why he matters</h3><p>His work underpins developmental considerations in capacity and culpability.</p>" },
{ "id":"vygotsky","discipline":"Psychology","name":"Lev Vygotsky","dates":"1896–1934","role":"Founder of sociocultural psychology","nutshell":"We learn through other people before we can do it alone.","featured":false,
"profile":"<h3>Context</h3><p>A Soviet psychologist whose work, long suppressed, became hugely influential.</p><h3>Key ideas</h3><ul><li><strong>Sociocultural theory.</strong> Higher functions develop through social interaction.</li><li><strong>Zone of proximal development.</strong> The gap between solo and assisted performance.</li><li><strong>Scaffolding.</strong> Skilled others support learning.</li><li><strong>Language and thought.</strong> Inner speech guides cognition.</li></ul><h3>Why he matters</h3><p>He offers the social counterpart to Piaget, shaping education and developmental theory.</p>" },
{ "id":"harlow","discipline":"Psychology","name":"Harry Harlow","dates":"1905–1981","role":"Researcher on attachment & contact comfort","nutshell":"Baby monkeys chose a cuddly cloth mother over a wire one with milk.","featured":false,
"profile":"<h3>Context</h3><p>An American psychologist whose controversial monkey experiments reshaped thinking about attachment.</p><h3>Key ideas</h3><ul><li><strong>Contact comfort.</strong> Infants preferred a soft mother to a feeding wire one.</li><li><strong>Secure base.</strong> The comforting figure as a base for exploration.</li><li><strong>Effects of deprivation.</strong> Isolation produced lasting damage.</li></ul><h3>Why he matters</h3><p>His findings gave empirical weight to attachment theory, though now seen as ethically troubling.</p>" },
{ "id":"bowlby","discipline":"Psychology","name":"John Bowlby","dates":"1907–1990","role":"Founder of attachment theory","nutshell":"Early bonds become the template for every relationship that follows.","featured":false,
"profile":"<h3>Context</h3><p>A British psychiatrist who combined ethology and clinical observation to explain the child's bond.</p><h3>Key ideas</h3><ul><li><strong>Attachment.</strong> Infants are predisposed to bond with a caregiver.</li><li><strong>Internal working models.</strong> Templates for later relationships.</li><li><strong>Maternal deprivation.</strong> Disruption has developmental consequences.</li><li><strong>Secure base.</strong> Extended by Ainsworth's attachment styles.</li></ul><h3>Forensic relevance</h3><p>Disrupted attachment and early adversity feature heavily in formulations of offending.</p>" },
{ "id":"asch","discipline":"Psychology","name":"Solomon Asch","dates":"1907–1996","role":"Researcher on conformity","nutshell":"People will call a short line long if enough strangers do it first.","featured":false,
"profile":"<h3>Context</h3><p>A Polish-American social psychologist whose simple experiments revealed group pressure.</p><h3>Key ideas</h3><ul><li><strong>Conformity experiments.</strong> Participants matched obviously wrong majority answers.</li><li><strong>Normative influence.</strong> Conforming to be accepted.</li><li><strong>The power of an ally.</strong> One dissenter sharply reduced conformity.</li></ul><h3>Why he matters</h3><p>Relevant to jury dynamics, gang behaviour and false confessions.</p>" },
{ "id":"milgram","discipline":"Psychology","name":"Stanley Milgram","dates":"1933–1984","role":"Researcher on obedience to authority","nutshell":"Ordinary people will deliver lethal shocks if a man in a coat tells them to.","featured":false,
"profile":"<h3>Context</h3><p>An American social psychologist who tested how far people would obey authority.</p><h3>Key ideas</h3><ul><li><strong>Obedience experiments.</strong> Most administered what they believed were dangerous shocks.</li><li><strong>Agentic state.</strong> Shifting responsibility to the authority.</li><li><strong>Situational factors.</strong> Proximity and legitimacy changed obedience.</li></ul><h3>Why he matters</h3><p>The studies illuminate how atrocities become possible and crimes of obedience.</p>" },
{ "id":"zimbardo","discipline":"Psychology","name":"Philip Zimbardo","dates":"1933–2024","role":"Director of the Stanford Prison Experiment","nutshell":"Put good people in a bad system and the system usually wins.","featured":false,
"profile":"<h3>Context</h3><p>An American social psychologist best known for the 1971 Stanford Prison Experiment.</p><h3>Key ideas</h3><ul><li><strong>Situationism.</strong> Behaviour driven by situation and role.</li><li><strong>The Lucifer effect.</strong> Ordinary people can commit evil under pressure.</li><li><strong>Deindividuation.</strong> Anonymity loosens moral restraint.</li></ul><h3>Why he matters</h3><p>Despite serious methodological criticism, it remains a touchstone in debates about institutional abuse.</p>" },
{ "id":"festinger","discipline":"Psychology","name":"Leon Festinger","dates":"1919–1989","role":"Originator of cognitive dissonance theory","nutshell":"Holding two clashing beliefs is so uncomfortable we will rewrite one.","featured":false,
"profile":"<h3>Context</h3><p>An American social psychologist who explained how people manage inconsistency.</p><h3>Key ideas</h3><ul><li><strong>Cognitive dissonance.</strong> Conflicting cognitions create tension we reduce.</li><li><strong>Effort justification.</strong> We value what we suffered for.</li><li><strong>Social comparison.</strong> We evaluate ourselves against others.</li></ul><h3>Forensic relevance</h3><p>Dissonance helps explain offence-supporting attitudes and minimisation.</p>" },
{ "id":"beck","discipline":"Psychology","name":"Aaron Beck","dates":"1921–2021","role":"Founder of cognitive therapy (CBT)","nutshell":"It is not events that distress us, but the thoughts we have about them.","featured":false,
"profile":"<h3>Context</h3><p>An American psychiatrist who developed cognitive therapy, now the most widely evidenced treatment.</p><h3>Key ideas</h3><ul><li><strong>Cognitive model.</strong> Emotions driven by interpretations, not events.</li><li><strong>Automatic thoughts and distortions.</strong> Biased thoughts maintain distress.</li><li><strong>Schemas.</strong> Core beliefs about self, world and future.</li><li><strong>Collaborative empiricism.</strong> Testing thoughts against evidence.</li></ul><h3>Forensic relevance</h3><p>CBT is the backbone of accredited offending-behaviour programmes.</p>" },
{ "id":"kahneman","discipline":"Psychology","name":"Daniel Kahneman","dates":"1934–2024","role":"Pioneer of judgement & decision-making","nutshell":"Your fast, intuitive brain is confident, quick — and often wrong.","featured":false,
"profile":"<h3>Context</h3><p>An Israeli-American psychologist who, with Tversky, founded the study of cognitive biases.</p><h3>Key ideas</h3><ul><li><strong>Two systems.</strong> Fast intuitive System 1 and slow deliberate System 2.</li><li><strong>Heuristics and biases.</strong> Shortcuts produce predictable errors.</li><li><strong>Prospect theory.</strong> Losses loom larger than equivalent gains.</li></ul><h3>Forensic relevance</h3><p>His work exposes biases in risk assessment and clinical judgement, and the case for structured methods.</p>" },
{ "id":"seligman","discipline":"Psychology","name":"Martin Seligman","dates":"b. 1942","role":"Founder of positive psychology","nutshell":"Helplessness can be learned — and so can optimism.","featured":false,
"profile":"<h3>Context</h3><p>An American psychologist who moved from studying helplessness to founding positive psychology.</p><h3>Key ideas</h3><ul><li><strong>Learned helplessness.</strong> Uncontrollable adversity produces passivity.</li><li><strong>Explanatory style.</strong> How we explain events shapes resilience.</li><li><strong>PERMA.</strong> Positive emotion, engagement, relationships, meaning, accomplishment.</li></ul><h3>Why he matters</h3><p>His shift toward strengths parallels desistance-focused rehabilitation.</p>" },
{ "id":"lombroso","discipline":"Forensic","name":"Cesare Lombroso","dates":"1835–1909","role":"Founder of criminal anthropology","nutshell":"Thought you could spot a criminal by the shape of their skull. (He could not.)","featured":false,
"profile":"<h3>Context</h3><p>An Italian physician and founding figure of positivist criminology.</p><h3>Key ideas</h3><ul><li><strong>The born criminal.</strong> Some biologically predisposed to crime.</li><li><strong>Atavism.</strong> Criminals as evolutionary throwbacks with physical stigmata.</li><li><strong>Positivism.</strong> Study crime empirically by measuring offenders.</li></ul><h3>Why he matters</h3><p>His claims were discredited as pseudoscience, but he founded the empirical, offender-focused study of crime.</p>" },
{ "id":"eysenck","discipline":"Forensic","name":"Hans Eysenck","dates":"1916–1997","role":"Theorist of the criminal personality","nutshell":"Criminality is wired into temperament — some nervous systems just condition poorly.","featured":false,
"profile":"<h3>Context</h3><p>A German-British psychologist who built a biologically grounded theory of personality and crime.</p><h3>Key ideas</h3><ul><li><strong>The PEN model.</strong> Psychoticism, Extraversion, Neuroticism.</li><li><strong>Theory of criminality.</strong> Offenders condition poorly and learn rules less well.</li><li><strong>Conditioning and conscience.</strong> Conscience as conditioned responses.</li></ul><h3>Forensic relevance</h3><p>One of the first testable biosocial theories; later work on his data integrity is contested.</p>" },
{ "id":"bandura","discipline":"Forensic","name":"Albert Bandura","dates":"1925–2021","role":"Founder of social learning theory","nutshell":"Children copy what they watch — especially aggression that gets rewarded.","featured":false,
"profile":"<h3>Context</h3><p>A Canadian-American psychologist who showed we learn by observing others.</p><h3>Key ideas</h3><ul><li><strong>Observational learning.</strong> The Bobo doll studies.</li><li><strong>Social learning theory.</strong> Modelling and vicarious reinforcement.</li><li><strong>Self-efficacy.</strong> Belief in one's ability shapes effort.</li><li><strong>Reciprocal determinism.</strong> Person, behaviour and environment interact.</li></ul><h3>Forensic relevance</h3><p>Social learning underpins how violence is modelled within families, peers and media.</p>" },
{ "id":"sutherland","discipline":"Forensic","name":"Edwin Sutherland","dates":"1883–1950","role":"Author of differential association theory","nutshell":"Crime is learned the same way anything else is — from the company you keep.","featured":false,
"profile":"<h3>Context</h3><p>An American sociologist, arguably the most influential criminologist of the 20th century.</p><h3>Key ideas</h3><ul><li><strong>Differential association.</strong> Criminal behaviour is learned in intimate groups.</li><li><strong>Excess of definitions.</strong> Offending when attitudes favouring law-breaking dominate.</li><li><strong>White-collar crime.</strong> He coined the term.</li></ul><h3>Forensic relevance</h3><p>His model informs the antisocial associates and attitudes among central risk factors.</p>" },
{ "id":"merton","discipline":"Forensic","name":"Robert K. Merton","dates":"1910–2003","role":"Author of strain theory","nutshell":"When society dangles goals it will not let everyone reach, some take shortcuts.","featured":false,
"profile":"<h3>Context</h3><p>A towering American sociologist who explained crime as a product of social structure.</p><h3>Key ideas</h3><ul><li><strong>Strain/anomie.</strong> A gap between goals and legitimate means.</li><li><strong>Modes of adaptation.</strong> Conformity, innovation, ritualism, retreatism, rebellion.</li></ul><h3>Forensic relevance</h3><p>Strain theory keeps the social and economic context of offending in view.</p>" },
{ "id":"hirschi","discipline":"Forensic","name":"Travis Hirschi","dates":"1935–2017","role":"Author of social control & self-control theory","nutshell":"Do not ask why people offend — ask why most of us do not.","featured":false,
"profile":"<h3>Context</h3><p>An American criminologist who reframed the central question of his field.</p><h3>Key ideas</h3><ul><li><strong>Social bond theory.</strong> Attachment, commitment, involvement, belief.</li><li><strong>Self-control theory.</strong> Low self-control, set early, as the general cause of crime.</li></ul><h3>Forensic relevance</h3><p>Bonds and self-control map onto protective factors and self-regulation targets.</p>" },
{ "id":"cleckley","discipline":"Forensic","name":"Hervey Cleckley","dates":"1903–1984","role":"Author of The Mask of Sanity","nutshell":"Described the charming, conscience-free personality hiding behind a normal face.","featured":false,
"profile":"<h3>Context</h3><p>An American psychiatrist whose 1941 book gave the first detailed clinical portrait of psychopathy.</p><h3>Key ideas</h3><ul><li><strong>The mask.</strong> A convincing appearance of normality concealing disturbance.</li><li><strong>Clinical profile.</strong> Superficial charm, no remorse, unreliability, shallow emotion.</li><li><strong>Semantic dementia.</strong> Knows the words of emotion but not their meaning.</li></ul><h3>Forensic relevance</h3><p>His criteria are the direct ancestor of Hare's PCL-R.</p>" },
{ "id":"hare","discipline":"Forensic","name":"Robert Hare","dates":"b. 1934","role":"Developer of the PCL-R","nutshell":"Turned psychopathy from a clinical impression into a 20-item score.","featured":false,
"profile":"<h3>Context</h3><p>A Canadian psychologist who operationalised psychopathy into the most widely used measure.</p><h3>Key ideas</h3><ul><li><strong>The PCL-R.</strong> A 20-item expertly rated checklist.</li><li><strong>Factor structure.</strong> Interpersonal/affective versus impulsive/antisocial.</li><li><strong>Psychopathy vs APD.</strong> Narrower and more affect-focused.</li></ul><h3>Forensic relevance</h3><p>Central to risk assessment, but requires accredited training and raises questions about prejudicial use.</p><div class=\"callout warn\">The PCL-R is a licensed instrument requiring formal training. This profile is background, not a substitute for qualification.</div>" },
{ "id":"kohlberg","discipline":"Forensic","name":"Lawrence Kohlberg","dates":"1927–1987","role":"Theorist of moral development","nutshell":"Moral reasoning grows in stages — and some offenders get stuck early.","featured":false,
"profile":"<h3>Context</h3><p>An American psychologist who mapped how moral reasoning develops.</p><h3>Key ideas</h3><ul><li><strong>Three levels, six stages.</strong> Preconventional, conventional, postconventional.</li><li><strong>Reasoning, not content.</strong> How one justifies a decision matters.</li><li><strong>Developmental arrest.</strong> Some plateau at self-interested stages.</li></ul><h3>Forensic relevance</h3><p>Lower-stage reasoning is associated with offending and targeted by moral-reasoning programmes.</p>" },
{ "id":"loftus","discipline":"Forensic","name":"Elizabeth Loftus","dates":"b. 1944","role":"Pioneer of eyewitness & false-memory research","nutshell":"Memory is not a recording — it can be rewritten by a single leading question.","featured":false,
"profile":"<h3>Context</h3><p>An American cognitive psychologist who transformed how the law understands memory.</p><h3>Key ideas</h3><ul><li><strong>Misinformation effect.</strong> Post-event information distorts memory.</li><li><strong>False memories.</strong> Entirely false memories can be implanted.</li><li><strong>Reconstructive memory.</strong> Remembering is reconstruction, not playback.</li></ul><h3>Forensic relevance</h3><p>Her work reshaped eyewitness testimony and the recovered-memory debate.</p>" },
{ "id":"gudjonsson","discipline":"Forensic","name":"Gísli Guðjónsson","dates":"b. 1947","role":"Authority on false confessions & suggestibility","nutshell":"Showed that the right pressure can make innocent people confess.","featured":false,
"profile":"<h3>Context</h3><p>An Icelandic-British forensic psychologist and former detective whose work reshaped police practice.</p><h3>Key ideas</h3><ul><li><strong>Interrogative suggestibility.</strong> Yielding to leading questions, measured by the GSS.</li><li><strong>Types of false confession.</strong> Voluntary, coerced-compliant, coerced-internalised.</li><li><strong>Vulnerability.</strong> Suggestibility and compliance in interview.</li></ul><h3>Forensic relevance</h3><p>His evidence helped quash wrongful convictions such as the Birmingham Six and Guildford Four.</p>" },
{ "id":"raine","discipline":"Forensic","name":"Adrian Raine","dates":"b. 1954","role":"Pioneer of neurocriminology","nutshell":"Used brain scans to argue that violence has a biology we ignore at our peril.","featured":false,
"profile":"<h3>Context</h3><p>A British neuroscientist who pioneered the brain-imaging study of violent offenders.</p><h3>Key ideas</h3><ul><li><strong>Neurocriminology.</strong> Reduced prefrontal activity and amygdala abnormalities linked to violence.</li><li><strong>Biosocial model.</strong> Biology interacts with social adversity.</li><li><strong>Early risk factors.</strong> Birth complications and early adversity raise risk.</li></ul><h3>Forensic relevance</h3><p>Raises profound questions for responsibility, sentencing and prevention.</p>" },
{ "id":"canter","discipline":"Forensic","name":"David Canter","dates":"b. 1944","role":"Founder of investigative psychology","nutshell":"Put offender profiling on a scientific footing instead of detective intuition.","featured":false,
"profile":"<h3>Context</h3><p>A British psychologist who founded investigative psychology.</p><h3>Key ideas</h3><ul><li><strong>Investigative psychology.</strong> Linking crime-scene behaviour to offender characteristics.</li><li><strong>Consistency.</strong> Offenders show consistencies between how they offend and live.</li><li><strong>Geographical profiling.</strong> Spatial patterns locate an offender's base.</li></ul><h3>Forensic relevance</h3><p>The evidence-based counterweight to dramatized profiling, shaping UK behavioural investigative advice.</p>" },
{ "id":"andrews-bonta","discipline":"Forensic","name":"Andrews & Bonta","dates":"fl. 1990–present","role":"Authors of the Risk-Need-Responsivity model","nutshell":"Match the dose of treatment to risk, target what actually drives crime.","featured":false,
"profile":"<h3>Context</h3><p>Canadian psychologists who developed the dominant framework for effective rehabilitation.</p><h3>Key principles (RNR)</h3><ul><li><strong>Risk.</strong> Match intensity to risk level.</li><li><strong>Need.</strong> Target criminogenic needs.</li><li><strong>Responsivity.</strong> Deliver in a style the person can engage with.</li></ul><h3>The Central Eight</h3><p>History of antisocial behaviour, antisocial personality, antisocial cognition, antisocial associates, plus family, work, leisure and substance misuse.</p><h3>Forensic relevance</h3><p>RNR is the evidence base behind accredited programmes and structured risk-need tools.</p>" },
{ "id":"ward","discipline":"Forensic","name":"Tony Ward","dates":"b. 1959","role":"Author of the Good Lives Model","nutshell":"Do not just manage risk — help people build a life worth not offending for.","featured":false,
"profile":"<h3>Context</h3><p>A New Zealand clinical psychologist who developed the Good Lives Model as a strengths-based complement to RNR.</p><h3>Key ideas</h3><ul><li><strong>Primary goods.</strong> Everyone seeks human goods; offending is a maladaptive route.</li><li><strong>Strengths-based rehabilitation.</strong> Build capacities for a fulfilling, prosocial life.</li><li><strong>Approach vs avoidance goals.</strong> Working toward a valued life motivates better.</li></ul><h3>Forensic relevance</h3><p>The GLM informs desistance-oriented practice, often integrated with RNR.</p>" },
{ "id":"dostoyevsky","discipline":"Literature","name":"Fyodor Dostoyevsky","dates":"1821–1881","role":"Russian novelist of guilt, freedom & crime","nutshell":"Mapped the psychology of guilt, freedom and murder from the inside.","featured":false,
"profile":"<h3>Context</h3><p>A Russian novelist whose mock-execution and Siberian penal servitude fed an unrivalled study of the human interior.</p><h3>Key works and ideas</h3><ul><li><strong>Crime and Punishment.</strong> Raskolnikov is undone not by detection but by conscience.</li><li><strong>The Brothers Karamazov.</strong> Faith, doubt, free will and the problem of evil.</li><li><strong>Notes from Underground.</strong> Spite, irrationality and the refusal to be reduced to self-interest.</li><li><strong>Freedom and suffering.</strong> People choose suffering to assert freedom.</li></ul><h3>Forensic relevance</h3><p>Arguably the deepest literary anatomy of the criminal mind: motive, rationalisation, conscience and punishment.</p>" },
{ "id":"kafka","discipline":"Literature","name":"Franz Kafka","dates":"1883–1924","role":"Czech-German writer of guilt & bureaucracy","nutshell":"Gave us the nightmare of guilt without a charge and justice without reason.","featured":false,
"profile":"<h3>Context</h3><p>A German-speaking Czech writer, trained in law, whose fiction gave the world the word Kafkaesque.</p><h3>Key works and ideas</h3><ul><li><strong>The Trial.</strong> Prosecuted for a crime never named.</li><li><strong>The Castle.</strong> A futile struggle for recognition from an opaque bureaucracy.</li><li><strong>The Metamorphosis.</strong> Alienation and the collapse of identity.</li><li><strong>The Kafkaesque.</strong> Absurd, dehumanising systems where rules are never disclosed.</li></ul><h3>Forensic relevance</h3><p>A powerful lens on procedural justice, powerlessness and the dignity of those processed by the system.</p>" },
{ "id":"camus","discipline":"Literature","name":"Albert Camus","dates":"1913–1960","role":"French-Algerian novelist of the absurd","nutshell":"In an indifferent universe, the only question is how we choose to live anyway.","featured":false,
"profile":"<h3>Context</h3><p>A French-Algerian writer and Nobel laureate who articulated the philosophy of the absurd.</p><h3>Key works and ideas</h3><ul><li><strong>The Stranger.</strong> Meursault is condemned as much for not weeping at his mother's funeral as for the crime.</li><li><strong>The Myth of Sisyphus.</strong> Revolt as the answer to absurdity.</li><li><strong>The Plague.</strong> Solidarity as the response to meaningless suffering.</li><li><strong>The absurd.</strong> The collision between our craving for meaning and a silent universe.</li></ul><h3>Forensic relevance</h3><p>A sharp indictment of how justice judges character and demeanour rather than the act.</p>" },
{ "id":"hugo","discipline":"Literature","name":"Victor Hugo","dates":"1802–1885","role":"French novelist of crime, law & mercy","nutshell":"Showed how the law can crush the very people it claims to protect.","featured":false,
"profile":"<h3>Context</h3><p>France's towering Romantic novelist and reforming conscience.</p><h3>Key works and ideas</h3><ul><li><strong>Les Misérables.</strong> Valjean, imprisoned for stealing bread, pursued by the legalistic Javert.</li><li><strong>The Last Day of a Condemned Man.</strong> A pioneering abolitionist novel.</li><li><strong>Mercy versus law.</strong> Rigid justice against human compassion.</li></ul><h3>Forensic relevance</h3><p>A landmark case against the death penalty and the convict's lifelong stigma.</p>" },
{ "id":"tolstoy","discipline":"Literature","name":"Leo Tolstoy","dates":"1828–1910","role":"Russian novelist of moral psychology","nutshell":"Dissected the moral interior with microscopic honesty.","featured":false,
"profile":"<h3>Context</h3><p>A giant of the realist novel who combined social canvas with psychological precision.</p><h3>Key works and ideas</h3><ul><li><strong>Anna Karenina.</strong> Desire, guilt and social judgement.</li><li><strong>The Death of Ivan Ilyich.</strong> A man confronting mortality and a false life.</li><li><strong>Resurrection.</strong> A juror follows a woman he wronged through courts, prisons and exile.</li><li><strong>Moral awakening.</strong> The possibility of conscience and change.</li></ul><h3>Forensic relevance</h3><p>Resurrection is a sustained critique of courts, prisons and penal exile.</p>" },
{ "id":"poe","discipline":"Literature","name":"Edgar Allan Poe","dates":"1809–1849","role":"American pioneer of guilt & detective fiction","nutshell":"Gave us both the guilty murderer's mind and the detective who catches him.","featured":false,
"profile":"<h3>Context</h3><p>An American master of the macabre who, almost incidentally, invented the detective story.</p><h3>Key works and ideas</h3><ul><li><strong>The Tell-Tale Heart.</strong> Conscience as hallucination.</li><li><strong>The Black Cat and The Cask of Amontillado.</strong> Compulsion and the rationalising narrator.</li><li><strong>The Murders in the Rue Morgue.</strong> Introduces detective Dupin and ratiocination.</li></ul><h3>Forensic relevance</h3><p>Father of detective fiction and pioneer of the psychological portrait of guilt and compulsion.</p>" },
{ "id":"orwell","discipline":"Literature","name":"George Orwell","dates":"1903–1950","role":"English novelist of surveillance & power","nutshell":"Gave us the vocabulary of the surveillance state and the policed mind.","featured":false,
"profile":"<h3>Context</h3><p>An English novelist and essayist whose writing on power and language produced two of the most influential political novels.</p><h3>Key works and ideas</h3><ul><li><strong>Nineteen Eighty-Four.</strong> Surveillance, thoughtcrime, doublethink and coerced confession.</li><li><strong>Animal Farm.</strong> How revolutions curdle into tyranny.</li><li><strong>Language and control.</strong> Newspeak restricts thought.</li></ul><h3>Forensic relevance</h3><p>The literary companion to Foucault: surveillance, manufactured guilt and confession under coercion.</p>" },
{ "id":"solzhenitsyn","discipline":"Literature","name":"Aleksandr Solzhenitsyn","dates":"1918–2008","role":"Russian witness to the penal system","nutshell":"Bore witness to what a penal system becomes when it loses all restraint.","featured":false,
"profile":"<h3>Context</h3><p>A Russian novelist and Nobel laureate who spent eight years in the Soviet labour camps.</p><h3>Key works and ideas</h3><ul><li><strong>The Gulag Archipelago.</strong> A documentary indictment of the forced-labour system.</li><li><strong>One Day in the Life of Ivan Denisovich.</strong> A single day in a labour camp.</li><li><strong>Moral responsibility.</strong> The line between good and evil cuts through every heart.</li></ul><h3>Forensic relevance</h3><p>Essential context for thinking critically about imprisonment and power.</p>" },
{ "id":"chekhov","discipline":"Literature","name":"Anton Chekhov","dates":"1860–1904","role":"Russian physician-writer of suffering","nutshell":"A physician who turned a clinical eye on suffering — and surveyed a real penal colony.","featured":false,
"profile":"<h3>Context</h3><p>A Russian doctor who became a master of the modern short story and drama.</p><h3>Key works and ideas</h3><ul><li><strong>Ward No. 6.</strong> A doctor confined in his own neglected psychiatric ward.</li><li><strong>The Island of Sakhalin.</strong> A rigorous study of a remote penal colony.</li><li><strong>Drama.</strong> The Seagull and Three Sisters reshaped theatre.</li></ul><h3>Forensic relevance</h3><p>A sharp study of psychiatric confinement and a humane investigation of a penal system.</p>" },
{ "id":"conrad","discipline":"Literature","name":"Joseph Conrad","dates":"1857–1924","role":"Polish-British novelist of guilt & darkness","nutshell":"Charted the moral darkness beneath the civilised surface.","featured":false,

 {t:"Not every trait is an adaptation; some are by-products or noise.",e:"Gould & Lewontin's spandrels critique warned against just-so adaptationist storytelling.",x:"Traits may be exaptations or architectural by-products rather than direct targets of selection.",v:"Distinguishing adaptation from by-product after the fact is genuinely hard.",l:"It disciplines evolutionary claims against post hoc narrative."},
 {t:"How modular the mind is remains contested.",e:"Massive-modularity claims (Cosmides & Tooby) are challenged by Fodor and Buller.",x:"The dispute is whether cognition is many special-purpose modules or more domain-general.",v:"Evidence is mixed and definitions of module vary, muddying the debate.",l:"It bears on how the mind's architecture should be theorised."},
 {t:"Strong evolutionary work derives a priori predictions and tests them.",e:"Gene-culture coevolution (Richerson & Boyd; Laland) yields testable models of cumulative culture.",x:"Predicting from selection theory, rather than fitting stories to traits, avoids the panglossian error.",v:"Inferring function from current utility risks circular reasoning.",l:"It is what separates rigorous from speculative evolutionary psychology."}
],
"EXP":[
 {t:"Experiments buy causal inference through control, trading some generalisability.",e:"Campbell & Stanley and Shadish, Cook & Campbell codified internal and external validity.",x:"Randomisation and control isolate a mechanism but can reduce realism.",v:"Tight control can produce findings that do not generalise beyond the lab.",l:"This trade-off frames every design decision."},
 {t:"Design choices determine which confounds threaten a conclusion.",e:"Between, within and factorial designs each manage nuisance variation differently (Fisher; Keppel).",x:"Randomisation, counterbalancing and blocking remove systematic alternative explanations.",v:"No design removes all threats; some confounds are intrinsic to the question.",l:"Sound design is the precondition for interpretable results."},
 {t:"Measurement and procedural artefacts can manufacture or hide effects.",e:"Orne's demand characteristics and Rosenthal's expectancy effects show participants and experimenters bias data.",x:"Cues about the hypothesis change behaviour, and weak manipulation checks let confounds pass.",v:"Some artefacts are subtle and only detectable with careful controls.",l:"Guarding against them protects validity at the bench."},
 {t:"A large share of published effects fail to replicate.",e:"The Open Science Collaboration replicated about a third of a 100-study sample; Ioannidis and Simmons explain why.",x:"Low power, p-hacking, HARKing and publication bias inflate false positives.",v:"Failed replication does not always mean a false original, but the base rate is alarming.",l:"It triggered the reforms that now define methodology."},
 {t:"Open-science practices constrain the flexibility that inflates false positives.",e:"Preregistration, registered reports and many-analysts studies (Nosek; Silberzahn) fix plans in advance.",x:"Committing hypotheses and analyses beforehand limits undisclosed researcher degrees of freedom.",v:"Preregistration can be gamed or too rigid for exploratory work.",l:"It is the practical response to the replication crisis."}
],
"FOR":[
 {t:"Theories of offending range from developmental trajectories to general personality-and-cognition models.",e:"Moffitt's life-course-persistent versus adolescence-limited typology and Andrews & Bonta's model are central.",x:"Offending reflects interacting individual histories, traits and learned attitudes over development.",v:"No single theory explains all offending, and typologies blur at the edges.",l:"It frames what risk assessment and intervention should target."},

 {t:"Rehabilitation models contest how best to reduce reoffending.",e:"Risk-Need-Responsivity (Andrews & Bonta) and the Good Lives Model (Ward) offer rival frameworks.",x:"RNR targets criminogenic needs in proportion to risk; GLM adds approach goals and a valued life.",v:"Whether GLM adds incremental value over well-implemented RNR is unresolved.",l:"It shapes the design of accredited offending-behaviour programmes."},
 {t:"Eyewitness memory is reconstructive and vulnerable to distortion.",e:"Loftus showed misinformation effects; the cognitive interview (Fisher & Geiselman) improves recall.",x:"Post-event information and leading questions can rewrite memory without the witness knowing.",v:"Confidence and accuracy correlate weakly, so confident witnesses can be wrong.",l:"It directly informs interviewing standards and testimony."},
 {t:"Psychology in court must communicate probabilistic risk without it being heard as certainty.",e:"Work on eyewitness, profiling and risk testimony (Wells; Faigman) documents misunderstanding by decision-makers.",x:"Group-level probabilities are easily misapplied to an individual's case.",v:"Experts can overstate certainty, and adversarial pressure distorts presentation.",l:"It is where psychological evidence meets, and can mislead, the law."}
],
"HLT":[
 {t:"Social-cognition models predict intentions well but behaviour weakly.",e:"The Theory of Planned Behaviour and Health Belief Model leave a large intention-behaviour gap.",x:"Beliefs and attitudes shape intention, but intention often fails to translate into action.",v:"These models neglect habit, environment and automatic processes.",l:"It motivates implementation-focused and structural interventions."},
 {t:"Health emerges from interacting biological, psychological and social levels.",e:"Engel's biopsychosocial model reframed disease beyond biomedicine.",x:"Outcomes depend on mechanisms across levels, not biology alone.",v:"The model is criticised as a slogan unless specific mediation pathways are tested.",l:"It pushes the field toward specified, testable mechanisms."},
 {t:"Stress affects health through appraisal and coping, not events alone.",e:"Lazarus & Folkman's transactional model and Sapolsky's physiology link appraisal to outcomes.",x:"How a demand is appraised and coped with determines its physiological toll.",v:"Self-reported stress and coping are noisy and retrospectively biased.",l:"It connects psychological process to bodily disease."},
 {t:"Closing the intention-behaviour gap needs more than motivation.",e:"Implementation intentions (Gollwitzer) and behaviour-change-technique taxonomies (Michie) specify how.",x:"If-then plans delegate action to a situational cue, bypassing in-the-moment deliberation.",v:"Effects vary by behaviour and can fade without environmental support.",l:"It turns vague advice into specified, evaluable techniques."},
 {t:"Wearables and EMA enable personalised, within-person intervention designs.",e:"Micro-randomised trials and just-in-time adaptive interventions (Nahum-Shani; Klasnja) deliver support at need.",x:"Momentary data trigger tailored prompts and allow N-of-1 causal inference.",v:"Designing valid micro-randomised trials and handling missing data is hard.",l:"It is the methodological growth area of the field."}
],
"IO":[
 {t:"Some selection methods predict job performance far better than others.",e:"Schmidt & Hunter's meta-analyses ranked cognitive ability and structured interviews highly; Sackett's re-analyses revised the rankings.",x:"Validity coefficients, corrected for range restriction, estimate how well a method forecasts performance.",v:"The range-restriction corrections themselves are contested, shifting the league table.",l:"It is the evidential basis for how organisations hire."},
 {t:"Motivation and engagement arise from the balance of demands and resources.",e:"Locke & Latham's goal-setting and the Job Demands-Resources model (Bakker & Demerouti) are core.",x:"Strain follows when demands exceed resources; engagement follows when resources are high.",v:"JD-R is so flexible it can accommodate almost any finding post hoc.",l:"It links individual motivation to job design."},
 {t:"Leadership and team effectiveness depend on conditions, not charisma alone.",e:"Bass's transformational leadership and Hackman's work on team enabling conditions are central.",x:"Clear direction, structure and support enable performance more than leader personality.",v:"Leadership research struggles with reverse causation and self-report bias.",l:"It informs how teams are structured and led."},
 {t:"Work design shapes wellbeing as well as output.",e:"Hackman & Oldham's job characteristics and Karasek's demand-control model link design to health.",x:"Autonomy, variety and control buffer strain and support intrinsic motivation.",v:"Effects are moderated by individual differences and context.",l:"It connects organisational design to occupational health."},
 {t:"Algorithmic hiring can encode and amplify bias while appearing objective.",e:"Work on adverse impact and fairness (Raghavan; Barocas & Selbst) documents the risks.",x:"Models trained on biased histories reproduce those patterns under a veneer of neutrality.",v:"Fairness has multiple incompatible definitions, and validation is legally fraught.",l:"It is an urgent applied problem at the frontier of selection."}
],
"MOL":[
 {t:"The neuron and synapse are the basic units of neural signalling.",e:"Kandel and Katz established chemical transmission and the molecular machinery of the synapse.",x:"Membrane potentials and neurotransmitter release convert electrical to chemical signals and back.",v:"Reductionism to molecules can lose sight of network-level function.",l:"It is the foundation for all cellular accounts of learning."},
 {t:"Synaptic plasticity is the leading cellular model of learning.",e:"Bliss & Lomo discovered LTP; Malenka detailed NMDA-receptor-dependent strengthening.",x:"Coincident activity strengthens synapses, giving Hebb's principle a molecular mechanism.",v:"Linking synaptic change to specific memories in behaving animals is harder than the slice work suggests.",l:"It connects molecules to memory."},
 {t:"Long-term memory requires signalling cascades and gene expression.",e:"Kandel's work on CREB and Silva's molecular studies show transcription is needed for lasting change.",x:"Late-phase potentiation depends on new protein synthesis that stabilises the synapse.",v:"The mapping from molecular markers to memory content remains indirect.",l:"It explains why some memories consolidate and others fade."},
 {t:"Optogenetics and chemogenetics move the field from correlation to causation.",e:"Deisseroth and Boyden developed light-gated control of defined neuron populations.",x:"Switching specific cells on or off tests whether they are necessary or sufficient for behaviour.",v:"Artificial drive may not reflect natural firing patterns.",l:"These tools made causal circuit dissection possible."},
 {t:"The engram is the physical trace of a specific memory.",e:"Tonegawa and Josselyn tagged and reactivated neuronal ensembles to trigger recall.",x:"Activity-dependent labelling shows particular ensembles store particular memories.",v:"Whether the engram is necessary, sufficient and stable is still being established.",l:"It is among the most fundable questions in memory neuroscience."}
],
"ANA":[
 {t:"The brain is organised at multiple scales from gross structures to layers.",e:"Neurodevelopment from the neural tube produces cortex, subcortex and brainstem with laminar structure.",x:"Position and layering relate systematically to connectivity and function.",v:"Gross localisation can mislead if connectivity is ignored.",l:"It is the map on which all functional claims are placed."},
 {t:"Cytoarchitecture parcellates cortex but only partly tracks function.",e:"Brodmann's areas, defined by cell structure, remain a standard reference.",x:"Differences in cellular layering mark regions that often, but not always, differ in function.",v:"Architectonic borders do not map cleanly onto functional or connectional boundaries.",l:"It links microanatomy to functional segregation."},
 {t:"The brain is increasingly understood as a connectome, not just areas.",e:"Sporns and Catani map white-matter tracts and network organisation.",x:"Function arises from integration across connected regions, not isolated modules.",v:"Connectivity measures depend heavily on method and thresholding choices.",l:"It reframes anatomy around integration as well as segregation."},
 {t:"The lesion method gives uniquely causal evidence about function.",e:"Scoville & Milner's patient H.M. dissociated declarative from procedural memory.",x:"A deficit following damage shows the region is necessary for the lost function.",v:"Lesions are rarely clean, and reorganisation complicates interpretation.",l:"It complements correlational imaging with causal inference."},
 {t:"Diffusion imaging reconstructs pathways but invents and misses tracts.",e:"Tractography validation challenges (Maier-Hein) show false positives at crossing fibres.",x:"The method infers pathways from water diffusion, which is ambiguous where fibres cross.",v:"Treating tractography output as ground-truth anatomy is a common, serious overreach.",l:"It demands caution in every connectivity claim from diffusion MRI."}
],
"NET":[
 {t:"Neuroethics covers both the ethics of neuroscience and the neuroscience of ethics.",e:"Roskies and Farah mapped the field's two complementary halves.",x:"It asks how to use neurotechnology responsibly and what the brain reveals about moral agency.",v:"The two halves can be conflated, muddying normative and empirical claims.",l:"It frames every specific debate that follows."},
 {t:"Brain data complicate, but do not settle, free will and responsibility.",e:"Libet's readiness-potential studies and neuroprediction work (Aharoni) are widely cited and contested.",x:"Predictive brain markers sit uneasily with punishment keyed to individual desert.",v:"Group-level probabilities apply poorly to individuals, and Libet's interpretation is disputed.",l:"It shapes how neuroscience may, or may not, enter sentencing."},
 {t:"Cognitive enhancement raises questions of authenticity, coercion and fairness.",e:"Sandel and Bostrom debate the ethics of pharmacological and stimulation-based enhancement.",x:"Enhancement may pressure people to compete, and may change valued aspects of the self.",v:"Evidence that current enhancers work reliably is thin, complicating the debate.",l:"It asks not only whether we can enhance but who decides and who pays."},
 {t:"The privacy of the mind is an emerging rights frontier.",e:"Ienca & Andorno proposed neurorights as brain data and neuromarketing expand.",x:"Decoding methods make formerly private mental states potentially observable.",v:"Decoding remains coarse, so some fears outpace current capability.",l:"It is prompting legal frameworks for mental privacy."},
 {t:"Covert awareness in unresponsive patients forces revisions of diagnosis and consent.",e:"Owen detected command-following via neuroimaging in some behaviourally unresponsive patients.",x:"Residual awareness without behavioural output challenges diagnosis and end-of-life decisions.",v:"Such findings are rare and methodologically demanding to establish.",l:"It is an area where science outpaces ethical and legal frameworks."}
],
"GEN":[
 {t:"Behavioural traits are heritable, as twin and family designs repeatedly show.",e:"Plomin's twin studies and Turkheimer's laws establish substantial heritability for most traits.",x:"Comparing identical and fraternal twins partitions variance into genetic and environmental components.",v:"Heritability is a population statistic, not a fixed individual or causal quantity.",l:"It sets the agenda that molecular methods then pursue."},
 {t:"The field moved from fragile candidate-gene findings to genome-wide methods.",e:"Caspi & Moffitt's 5-HTTLPR work largely failed to replicate; GWAS (Visscher) succeeded it.",x:"Single-variant stories were underpowered; genome-wide scans test millions of variants properly.",v:"Early candidate-gene literature is now seen as largely false positives.",l:"It reshaped how behaviour genetics is done."},

],
"IMG":[
 {t:"Each imaging method measures a different, indirect proxy for neural activity.",e:"fMRI tracks the slow BOLD haemodynamic response; EEG and MEG capture fast electromagnetic signals (Ogawa; Logothetis).",x:"Spatial and temporal resolution trade off, and none measure spikes directly.",v:"Forgetting that BOLD is not neural firing invites overinterpretation.",l:"It determines what any imaging study can and cannot claim."},
 {t:"Design and preprocessing choices shape what an imaging result shows.",e:"Friston's SPM framework and Poldrack's methodological work formalise the analysis pipeline.",x:"Modelling, motion correction and smoothing decisions all influence the final statistical map.",v:"Pipeline flexibility creates many defensible analyses and hidden degrees of freedom.",l:"It is why preprocessing transparency matters for reproducibility."},
 {t:"Reverse inference and uncorrected comparisons produce false conclusions.",e:"Bennett's dead-salmon result and Eklund's cluster-inference work exposed the problem.",x:"Inferring a mental process from activation is invalid unless the region is selective for it, and many comparisons inflate false positives.",v:"Some early literature rested on exactly these errors.",l:"It mandates correction and caution in interpretation."},

 {t:"Reliable brain-behaviour correlations require very large samples.",e:"Marek and colleagues showed brain-wide association studies need thousands of participants.",x:"Small samples produce inflated, unreplicable effect sizes for individual differences.",v:"Large consortia are expensive and can obscure meaningful subgroups.",l:"It recalibrated expectations for the whole imaging field."}
],
"NEU":[
 {t:"Classic neurology infers function from the deficits that damage produces.",e:"Broca, Wernicke and Geschwind localised language and described disconnection syndromes.",x:"A reliable deficit after a lesion implies that region is necessary for the function.",v:"Single cases are noisy and lesions rarely respect functional boundaries.",l:"It is the historical root of cognitive neuroscience."},

 {t:"Famous single cases are powerful but must be read critically.",e:"Phineas Gage anchored claims about prefrontal cortex and social conduct, but the account was embellished.",x:"A vivid case can establish a hypothesis yet cannot, alone, confirm a general theory.",v:"Retrospective and anecdotal detail inflates such cases over time.",l:"It teaches caution about generalising from one brain."},
 {t:"Many conditions once seen as focal are network diseases.",e:"Seeley and Raj show some dementias spread along connected networks.",x:"Pathology propagates through connectivity, so symptoms reflect network, not point, damage.",v:"Network models are still being validated against pathology.",l:"It reframes diagnosis and biomarker search."},

],
"PHY":[

],
"NPS":[

 {t:"Assessment spans separable cognitive domains.",e:"Frameworks from Baddeley and Stuss cover memory, language, attention and executive function.",x:"Profiling strengths and weaknesses across domains localises and characterises impairment.",v:"Tasks are rarely process-pure, so scores reflect multiple abilities.",l:"It structures clinical neuropsychological assessment."},

],
"SUR":[

],
"NUT":[

],
"PER":[
 {t:"Psychophysics relates physical stimuli to subjective sensation.",e:"Fechner and Stevens quantified thresholds and scaling; Green & Swets added detection theory.",x:"Lawful functions map stimulus intensity onto perceived magnitude and detectability.",v:"Such laws abstract away context and top-down influence.",l:"It is the quantitative foundation of perception research."},

"PRS":[

"PLG":[
