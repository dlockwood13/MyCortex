<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0E1020" />
<title>Cortex — Postgraduate Psychology</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link rel="icon" href="./favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#0E1020; --surface:#161829; --surface2:#1e2138; --line:rgba(236,231,218,.10);
  --text:#ECE7DA; --muted:#9A9AB6; --gold:#C9A227; --teal:#5BE0C9; --bad:#E06D7A;
  --maxw:680px;
  --serif:"Fraunces",Georgia,serif; --sans:"Inter",system-ui,sans-serif; --mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--ink);color:var(--text);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#root,.app{height:100%}
button{font-family:inherit;cursor:pointer}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}

.app{display:flex;flex-direction:column;height:100dvh;max-width:var(--maxw);margin:0 auto;
  background:radial-gradient(120% 80% at 50% -10%, #1a1330 0%, var(--ink) 55%);position:relative}

/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:max(10px,env(safe-area-inset-top)) 18px 10px;border-bottom:1px solid var(--line);
  background:rgba(14,16,32,.7);backdrop-filter:blur(10px);position:sticky;top:0;z-index:5}
.brand{display:flex;align-items:center;gap:9px}
.brand .mark{display:grid;place-items:center;width:28px;height:28px;border-radius:8px;
  background:linear-gradient(140deg,#3a2150,#0E1020);border:1px solid var(--gold);
  color:var(--gold);font-family:var(--serif);font-weight:600;font-size:17px;box-shadow:0 0 18px rgba(201,162,39,.25)}
.brand .word{font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:.3px}
.pill{font-family:var(--mono);font-size:11px;letter-spacing:.4px;color:var(--gold);
  background:rgba(201,162,39,.10);border:1px solid rgba(201,162,39,.35);border-radius:999px;padding:5px 11px}
.pill.ghosted{color:var(--muted);border-color:var(--line);background:transparent}

/* scroll area */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll.is-feed{scroll-snap-type:y mandatory;scroll-padding-top:0}

/* feed cards */
.feed{display:flex;flex-direction:column}
.card{scroll-snap-align:start;min-height:calc(100dvh - 132px);display:flex;flex-direction:column;
  justify-content:center;padding:30px 22px 26px;position:relative;border-bottom:1px solid var(--line)}
.saved .card,.proposal .card{min-height:auto;justify-content:flex-start;padding:24px 22px;
  margin:0 0 14px;border:1px solid var(--line);border-radius:16px;background:var(--surface)}
.card-rule{position:absolute;left:22px;right:22px;top:30px;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent 70%);opacity:.8}
.saved .card-rule,.proposal .card-rule{display:none}
.card-head{display:flex;align-items:center;justify-content:space-between;margin:14px 0 22px}
.callno{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.type-eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.card-disc{font-family:var(--mono);font-size:12px;letter-spacing:.3px;margin-bottom:10px;
  padding-left:12px;border-left:3px solid hsl(var(--dh) 55% 60% / .8)}
.card-title{font-family:var(--serif);font-weight:600;font-size:clamp(25px,6.2vw,33px);line-height:1.12;margin:0 0 16px}
.card-body{font-size:16.5px;line-height:1.58;color:#dcd8cc;margin:0;max-width:36em}

/* check / quiz */
.check{margin-top:20px}
.ghost{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:12px;
  padding:11px 16px;font-size:14px;font-weight:500;transition:border-color .15s,background .15s}
.ghost:hover{border-color:var(--gold);color:var(--gold)}
.ghost.danger:hover{border-color:var(--bad);color:var(--bad)}
.quiz{border:1px solid var(--line);border-radius:14px;padding:16px;background:rgba(30,33,56,.5)}
.quiz-q{font-size:15px;font-weight:600;margin:0 0 12px;line-height:1.4}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.opt{text-align:left;background:var(--surface2);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.35;transition:border-color .12s}
.opt:hover:not(:disabled){border-color:var(--muted)}
.opt.right{border-color:var(--teal);background:rgba(91,224,201,.12);color:#d6fff5}
.opt.wrong{border-color:var(--bad);background:rgba(224,109,122,.12)}
.opt:disabled{cursor:default}
.quiz-why{font-size:13.5px;line-height:1.5;color:var(--muted);margin:12px 0 0}

/* card footer */
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:24px;gap:12px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.5px;
  border:1px solid;border-radius:999px;padding:4px 10px;white-space:nowrap}
.foot-actions{display:flex;gap:8px}
.act{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:999px;
  padding:8px 14px;font-size:13px;font-weight:500;transition:all .14s}
.act:hover{color:var(--text);border-color:var(--muted)}
.act.on{color:var(--gold);border-color:rgba(201,162,39,.5);background:rgba(201,162,39,.10)}

.feed-end{min-height:40vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;gap:6px;padding:40px 24px;scroll-snap-align:start}
.feed-end p{font-family:var(--serif);font-size:20px;margin:0}
.feed-end span{color:var(--muted);font-size:13.5px;max-width:24em}

.empty{padding:60px 28px;text-align:center;color:var(--muted);font-size:15px;line-height:1.6}

/* page chrome (browse/saved/proposal/you) */
.browse,.saved,.proposal,.you{padding:24px 20px 40px}
.page-title{font-family:var(--serif);font-weight:600;font-size:30px;margin:4px 0 6px}
.page-sub{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 22px;max-width:34em}

/* browse */
.dom-block{margin-bottom:26px}
.dom-label{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:0 0 12px}
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.disc-card{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:14px;display:flex;flex-direction:column;gap:8px;color:var(--text);
  border-left:3px solid hsl(var(--dh) 55% 60% / .85);transition:transform .12s,border-color .12s}
.disc-card:hover{transform:translateY(-2px);border-color:hsl(var(--dh) 55% 62%)}
.disc-code{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--muted)}
.disc-name{font-size:14px;font-weight:600;line-height:1.25;min-height:2.4em}
.bar{height:4px;border-radius:99px;background:var(--surface2);overflow:hidden}
.bar i{display:block;height:100%;background:hsl(var(--dh) 60% 62%);border-radius:99px}
.disc-meta{font-family:var(--mono);font-size:10px;color:var(--muted)}

/* proposal */
.prop-progress{height:5px;border-radius:99px;background:var(--surface2);overflow:hidden;margin:-8px 0 22px}
.prop-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold))}
.field{margin-bottom:18px;display:flex;flex-direction:column;gap:5px}
.field label{font-family:var(--serif);font-size:16px;font-weight:600}
.field-hint{color:var(--muted);font-size:12.5px;line-height:1.45}
.field input,.field textarea{width:100%;background:var(--surface);border:1px solid var(--line);
  border-radius:10px;color:var(--text);font-family:var(--sans);font-size:14.5px;line-height:1.5;
  padding:11px 12px;resize:vertical}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.prop-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.file-btn{display:inline-flex;align-items:center}

/* you */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center}
.stat b{display:block;font-family:var(--serif);font-size:24px;font-weight:600;color:var(--gold)}
.stat span{font-size:10.5px;color:var(--muted);letter-spacing:.2px}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px}
.panel h3{font-family:var(--serif);font-size:18px;margin:0 0 4px}
.panel-sub{color:var(--muted);font-size:13px;line-height:1.5;margin:0 0 14px}
.seg{display:flex;gap:6px;background:var(--surface2);border-radius:12px;padding:4px}
.seg-btn{flex:1;background:transparent;border:none;color:var(--muted);border-radius:9px;padding:9px;font-size:13px;font-weight:500}
.seg-btn.on{background:var(--ink);color:var(--gold)}
.path{display:flex;flex-direction:column;gap:8px}
.path-row{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--line);
  border-radius:10px;padding:11px 13px;color:var(--text);text-align:left}
.path-row:hover{border-color:var(--gold)}
.path-code{font-family:var(--mono);font-size:10px;color:var(--muted);width:42px}
.path-name{flex:1;font-size:14px;font-weight:500}
.path-pct{font-family:var(--mono);font-size:12px;color:var(--teal)}
.focus-note{font-size:13px;color:var(--muted);margin:14px 0 0;line-height:1.5}
.link{background:none;border:none;color:var(--gold);text-decoration:underline;font-size:13px;padding:0}
.colophon{text-align:center;color:var(--muted);font-size:11.5px;margin-top:26px;line-height:1.6;font-family:var(--mono)}

/* tab bar */
.tabbar{display:flex;border-top:1px solid var(--line);background:rgba(14,16,32,.92);
  backdrop-filter:blur(12px);padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:9px 0 8px;font-size:10.5px;letter-spacing:.2px}
.tab-ic{font-size:17px;line-height:1}
.tab.on{color:var(--gold)}

@media(min-width:560px){.disc-grid{grid-template-columns:1fr 1fr 1fr}}

/* ===== social layer ===== */
.stories{display:flex;gap:14px;overflow-x:auto;padding:12px 16px;border-bottom:1px solid var(--line);
  background:rgba(14,16,32,.6);-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.story{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 auto;width:60px;padding:0}
.story-av{display:grid;place-items:center;width:54px;height:54px;border-radius:50%;
  font-family:var(--mono);font-size:13px;font-weight:600;border:2px solid var(--line);
  background:var(--surface2);color:var(--muted)}
.story-av.all{background:linear-gradient(145deg,#3a2150,#0E1020);border-color:var(--gold);color:var(--gold);font-size:18px}
.story.on .story-av{outline:2px solid var(--gold);outline-offset:2px}
.story-lab{font-size:10.5px;color:var(--muted);max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.story.on .story-lab{color:var(--text)}

.post-head{display:flex;align-items:center;gap:11px;margin:0 0 16px}
.avatar{display:grid;place-items:center;border-radius:50%;border:1.5px solid;font-family:var(--mono);font-weight:600;flex:0 0 auto}
.acct{display:flex;flex-direction:column;min-width:0;flex:1}
.acct-name{font-family:var(--serif);font-weight:600;font-size:15.5px;line-height:1.2;display:flex;align-items:center;gap:5px}
.acct-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
.verified{display:inline-grid;place-items:center;width:15px;height:15px;border-radius:50%;
  background:var(--teal);color:var(--ink);font-size:9px;font-weight:700;flex:0 0 auto}
.post-tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  border:1px solid;border-radius:999px;padding:4px 9px;flex:0 0 auto}

.heart-burst{position:absolute;inset:0;display:grid;place-items:center;font-size:130px;color:var(--bad);
  pointer-events:none;z-index:3;animation:burst .7s ease-out forwards;text-shadow:0 6px 30px rgba(224,109,122,.5)}
@keyframes burst{0%{transform:scale(.3);opacity:0}30%{transform:scale(1);opacity:.92}100%{transform:scale(1.18);opacity:0}}

.actions{display:flex;align-items:center;gap:6px;margin-top:22px;flex-wrap:wrap}
.a-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--line);
  color:var(--muted);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:500;transition:all .14s}
.a-btn:hover{color:var(--text);border-color:var(--muted)}
.a-btn.on{color:var(--gold);border-color:rgba(201,162,39,.5);background:rgba(201,162,39,.10)}
.a-ic{font-size:15px;line-height:1}
.a-spacer{flex:1}
.toast{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);background:var(--surface2);
  border:1px solid var(--line);color:var(--text);font-size:12.5px;padding:8px 14px;border-radius:999px;
  box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:4}

/* browse card tweak */
.disc-card-top{display:flex;align-items:center;gap:8px}

/* discipline detail */
.disc-detail{padding:18px 20px 44px}
.back{background:none;border:none;color:var(--muted);font-size:14px;padding:4px 0;margin-bottom:8px}
.back:hover{color:var(--gold)}
.dd-head{display:flex;align-items:center;gap:15px;margin-bottom:14px}
.dd-id{min-width:0}
.dd-name{font-family:var(--serif);font-weight:600;font-size:23px;line-height:1.15;margin:0;display:flex;align-items:center;gap:7px}
.dd-handle{font-family:var(--mono);font-size:12px;color:var(--gold);display:block;margin-top:3px}
.dd-meta{font-family:var(--mono);font-size:11px;color:var(--muted);display:block;margin-top:4px}
.dd-bar{margin:0 0 16px}
.dd-actions{display:flex;gap:10px;margin-bottom:28px}
.follow{flex:1;background:var(--gold);color:var(--ink);border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:600}
.follow:hover{filter:brightness(1.08)}
.syl-h{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
.syl-overview{font-family:var(--serif);font-size:17px;line-height:1.45;color:#dcd8cc;margin:0 0 18px;font-style:italic}
.mod{display:flex;gap:13px;padding:15px 0;border-top:1px solid var(--line)}
.mod-n{flex:0 0 auto;display:grid;place-items:center;width:28px;height:28px;border-radius:50%;
  border:1px solid;font-family:var(--mono);font-size:13px;font-weight:600}
.mod-body{min-width:0}
.mod-t{font-family:var(--serif);font-weight:600;font-size:16px;line-height:1.25;margin-bottom:5px}
.mod-o{font-size:14px;line-height:1.5;color:#cfcabe}
.mod-k{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:7px;line-height:1.4}
.dd-posts{margin-top:32px}
.disc-detail .card{scroll-snap-align:none;min-height:auto;justify-content:flex-start;padding:20px;
  margin:0 0 14px;border:1px solid var(--line);border-radius:16px;background:var(--surface);border-bottom:1px solid var(--line)}
.disc-detail .card .card-rule{display:none}

/* profile header (You) */
.profile{display:flex;align-items:center;gap:15px;margin:4px 0 22px}
.pf-avatar{display:grid;place-items:center;width:62px;height:62px;border-radius:50%;
  background:linear-gradient(145deg,#3a2150,#0E1020);border:2px solid var(--gold);color:var(--gold);
  font-family:var(--serif);font-size:19px;font-weight:600;flex:0 0 auto}
.pf-name{font-family:var(--serif);font-weight:600;font-size:24px;margin:0}
.pf-handle{font-family:var(--mono);font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
/* Cortex — postgraduate psychology content.
   Card types: theory | study | debate | method | frontier
   level: 7 (taught mastery) | 8 (research frontier)
   UK English. No em dashes. */
window.CORTEX_DATA = {
  domains: {
    applied:  { label: "Applied",   hue: 38  },
    clinical: { label: "Clinical",  hue: 192 },
    cognitive:{ label: "Cognitive", hue: 268 },
    neuro:    { label: "Neuro",     hue: 330 },
    method:   { label: "Method",    hue: 150 },
    social:   { label: "Social",    hue: 14  }
  },
  disciplines: [
    {
      code: "ABN", name: "Abnormal psychology", domain: "clinical",
      cards: [
        { type:"theory", level:7, title:"From the four Ds to harmful dysfunction",
          body:"Deviance, distress, dysfunction and danger are the classic markers, but Wakefield's harmful dysfunction account reframes disorder as a failure of an evolved function that also causes harm by social values. It is the bridge between a purely statistical and a purely normative definition." },
        { type:"debate", level:7, title:"Is 'abnormal' a category or a continuum?",
          body:"Taxometric work (Meehl, Ruscio) tests whether conditions are latent classes or points on a dimension. Most common presentations, depression and anxiety especially, behave dimensionally, which undercuts the categorical logic of DSM thresholds." },
        { type:"frontier", level:8, title:"RDoC as a replacement ontology",
          body:"The NIMH Research Domain Criteria abandon disorder categories for transdiagnostic constructs (e.g. negative valence, cognitive systems) measured across genes, circuits and behaviour. A live thesis question is whether RDoC dimensions predict treatment response better than DSM labels do." }
      ],
      quiz: [
        { q:"Wakefield's 'harmful dysfunction' requires which two components?", a:["A failure of an evolved function AND harm by social standards","Statistical rarity AND personal distress","Danger to self AND danger to others","Cultural deviance AND impaired insight"], correct:0,
          why:"Both an objective dysfunction and a value-laden harm must be present; either alone is insufficient." },
        { q:"Taxometric analysis is used primarily to decide whether a condition is...", a:["Categorical or dimensional in structure","Heritable or environmental","Acute or chronic","Treatable or untreatable"], correct:0,
          why:"It tests latent structure: discrete taxon versus continuous dimension." }
      ]
    },
    {
      code: "BEH", name: "Behavioural psychology / neuroscience", domain: "neuro",
      cards: [
        { type:"theory", level:7, title:"Rescorla-Wagner and prediction error",
          body:"Associative strength updates in proportion to surprise: learning happens only when an outcome is not already predicted. The model explains blocking and overshadowing and is the conceptual ancestor of dopaminergic reward-prediction-error accounts." },
        { type:"study", level:7, title:"Schultz: dopamine codes prediction error",
          body:"Single-unit recordings in primate midbrain showed dopamine neurons fire to unexpected reward, shift to the predictive cue once learned, and dip below baseline when an expected reward is omitted. This mapped Rescorla-Wagner onto a literal neural signal." },
        { type:"frontier", level:8, title:"Model-based vs model-free control",
          body:"Behaviour blends a fast habitual (model-free) system and a deliberative (model-based) system. The two-step task dissociates them, and the balance between them is altered in compulsive and addictive disorders, a fertile area for computational-psychiatry theses." }
      ],
      quiz: [
        { q:"In Rescorla-Wagner, learning stops when...", a:["The outcome is fully predicted (zero prediction error)","The reward becomes very large","The cue is presented in isolation","Extinction begins"], correct:0,
          why:"Update is proportional to the discrepancy between predicted and actual outcome; no surprise, no learning." }
      ]
    },
    {
      code: "CLN", name: "Clinical psychology / neuroscience", domain: "clinical",
      cards: [
        { type:"method", level:7, title:"Formulation over diagnosis",
          body:"Clinical psychology privileges idiographic formulation: a hypothesis linking predisposing, precipitating, perpetuating and protective factors (the 5 Ps) to presenting problems. It is testable and revisable, unlike a static label." },
        { type:"debate", level:7, title:"The dodo bird verdict",
          body:"Meta-analyses repeatedly find broadly equivalent outcomes across bona fide therapies, implicating common factors (alliance, expectancy) over specific techniques. Critics argue equivalence is an artefact of underpowered non-inferiority designs." },
        { type:"frontier", level:8, title:"Precision mental health",
          body:"Can we match patients to treatments using baseline markers? Personalised advantage indices and machine-learning treatment-selection models are promising but routinely fail to replicate out of sample, the central methodological problem of the field." }
      ],
      quiz: [
        { q:"The '5 Ps' formulation includes predisposing, precipitating, perpetuating, protective and...", a:["Presenting factors","Pharmacological factors","Prognostic factors","Personality factors"], correct:0,
          why:"Presenting problem anchors the formulation that the other four factors explain." }
      ]
    },
    {
      code: "COG", name: "Cognitive psychology / neuroscience", domain: "cognitive",
      cards: [
        { type:"theory", level:7, title:"Predictive processing",
          body:"The brain is cast as a hierarchical generative model minimising prediction error: perception is controlled hallucination constrained by sensory input, and attention is precision-weighting of prediction errors. It unifies perception, action and learning under one objective." },
        { type:"study", level:7, title:"Baddeley and Hitch working memory",
          body:"The multicomponent model (phonological loop, visuospatial sketchpad, central executive, later the episodic buffer) replaced the unitary short-term store and remains the most cited framework for temporary maintenance and manipulation of information." },

<script type="text/babel" data-presets="react">
/* Cortex app — single-file React via CDN, transformed by Babel standalone. */
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const DATA = window.CORTEX_DATA;
const DISCIPLINES = DATA.disciplines;
const DOMAINS = DATA.domains;
const SYLLABI = window.CORTEX_SYLLABI || {};
DISCIPLINES.forEach((d) => { d.syllabus = SYLLABI[d.code] || null; });
function discHandle(d){ return "@" + d.code.toLowerCase().replace(/[^a-z0-9]/g, "") + ".psy"; }
function monogram(d){ var m = d.code.replace(/[^A-Z]/g, ""); return (m || d.code).slice(0,2).toUpperCase(); }

const TYPE_META = {
  theory:   { label: "Theory",    accent: "#8FA7FF" },
  study:    { label: "Key study", accent: "#5BE0C9" },
  debate:   { label: "Debate",    accent: "#E0A35B" },
  method:   { label: "Method",    accent: "#B98FFF" },
  frontier: { label: "Frontier",  accent: "#C9A227" }
};

const STORE_KEY = "cortex_state_v1";
const defaultState = {
  liked: {}, saved: {}, seen: {}, quiz: {}, level: "all", focus: null, domain: null, proposal: {}
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return { ...defaultState };
    return { ...defaultState, ...JSON.parse(raw) };
  } catch (e) { return { ...defaultState }; }
}
function saveState(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch (e) {}
}

function buildCards() {
  const out = [];
  DISCIPLINES.forEach((d) => {
    d.cards.forEach((c, i) => {
      out.push({ id: d.code + "-" + i, disc: d, type: c.type, level: c.level, title: c.title, body: c.body });
    });
  });
  return out;
}
const ALL_CARDS = buildCards();

function hueColor(h, l = 60, s = 55) { return "hsl(" + h + " " + s + "% " + l + "%)"; }

function Chip({ children, color }) {
  return <span className="chip" style={{ color: color, borderColor: color }}>{children}</span>;
}
function LevelChip({ level }) {
  const isPhd = level === 8;
  return <Chip color={isPhd ? "#C9A227" : "#5BE0C9"}>{isPhd ? "L8 · PhD" : "L7 · MSc"}</Chip>;
}

function Avatar({ d, size }) {
  const dh = DOMAINS[d.domain].hue;
  const s = size || 42;
  return (
    <span className="avatar" style={{ width: s, height: s, fontSize: Math.round(s * 0.33),
      background: "linear-gradient(145deg, hsl(" + dh + " 55% 32%), hsl(" + dh + " 60% 15%))",
      borderColor: "hsl(" + dh + " 55% 55% / .6)", color: "hsl(" + dh + " 72% 80%)" }}>
      {monogram(d)}
    </span>
  );
}

function Card({ card, state, dispatch, showCheck }) {
  const [open, setOpen] = useState(false);
  const [picked, setPicked] = useState(null);
  const [burst, setBurst] = useState(false);
  const [msg, setMsg] = useState(null);
  const tm = TYPE_META[card.type];
  const dh = DOMAINS[card.disc.domain].hue;
  const liked = !!state.liked[card.id];
  const saved = !!state.saved[card.id];
  const quizItem = card.disc.quiz && card.disc.quiz.length
    ? card.disc.quiz[(parseInt(card.id.split("-").pop(), 10)) % card.disc.quiz.length]
    : null;

  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el || !("IntersectionObserver" in window)) { dispatch({ t: "seen", id: card.id }); return; }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((en) => {
        if (en.isIntersecting && en.intersectionRatio >= 0.5) { dispatch({ t: "seen", id: card.id }); io.disconnect(); }
      });
    }, { threshold: [0, 0.5, 1] });
    io.observe(el);
    return () => io.disconnect();
  }, [card.id]);

  function flash(t) { setMsg(t); setTimeout(() => setMsg(null), 1600); }
  function onDouble() {
    if (!state.liked[card.id]) dispatch({ t: "like", id: card.id });
    setBurst(true); setTimeout(() => setBurst(false), 700);
  }
  function share() {
    const txt = card.title + "\n\n" + card.body + "\n\n— Cortex · " + card.disc.name + " " + discHandle(card.disc);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(() => flash("Copied to clipboard")).catch(() => flash("Could not copy"));
    } else { flash("Clipboard unavailable"); }
  }

  return (
    <article ref={ref} className="card" style={{ "--dh": dh, "--accent": tm.accent }} onDoubleClick={onDouble}>
      <div className="card-rule" />
      <header className="post-head">
        <Avatar d={card.disc} />
        <div className="acct">
          <span className="acct-name">{card.disc.name}<span className="verified" title="Curated field">✓</span></span>
          <span className="acct-sub">{discHandle(card.disc)} · {DOMAINS[card.disc.domain].label}</span>
        </div>
        <span className="post-tag" style={{ color: tm.accent, borderColor: tm.accent }}>{tm.label}</span>
      </header>

      <h2 className="card-title">{card.title}</h2>
      <p className="card-body">{card.body}</p>

      {burst && <span className="heart-burst">♥</span>}

      {showCheck && quizItem && open && (
        <div className="quiz">
          <p className="quiz-q">Seminar prompt · {quizItem.q}</p>
          <div className="quiz-opts">
            {quizItem.a.map((opt, i) => {
              let cls = "opt";
              if (picked !== null) {
                if (i === quizItem.correct) cls += " right";
                else if (i === picked) cls += " wrong";
              }
              return (
                <button key={i} className={cls} disabled={picked !== null}
                  onClick={() => { setPicked(i); dispatch({ t: "quiz", id: card.disc.code, correct: i === quizItem.correct }); }}>
                  {opt}
                </button>
              );
            })}
          </div>
          {picked !== null && (
            <p className="quiz-why">{picked === quizItem.correct ? "Correct. " : "Not quite. "}{quizItem.why}</p>
          )}
        </div>
      )}

      <footer className="actions">
        <button className={"a-btn" + (liked ? " on" : "")} onClick={() => dispatch({ t: "like", id: card.id })}>
          <span className="a-ic">{liked ? "♥" : "♡"}</span><span className="a-lab">{liked ? "Understood" : "Got it"}</span>
        </button>
        {showCheck && quizItem && (
          <button className={"a-btn" + (open ? " on" : "")} onClick={() => setOpen((o) => !o)}>
            <span className="a-ic">✎</span><span className="a-lab">Discuss</span>
          </button>
        )}
        <button className={"a-btn" + (saved ? " on" : "")} onClick={() => dispatch({ t: "save", id: card.id })}>
          <span className="a-ic">{saved ? "★" : "☆"}</span><span className="a-lab">{saved ? "Saved" : "Save"}</span>
        </button>
        <button className="a-btn" onClick={share}>
          <span className="a-ic">↗</span><span className="a-lab">Share</span>
        </button>
        <span className="a-spacer" />
        <LevelChip level={card.level} />
      </footer>
      {msg && <div className="toast">{msg}</div>}
    </article>
  );
}

function Feed({ cards, state, dispatch }) {
  if (!cards.length) return <div className="empty">No cards match this filter. Clear the focus on the You tab.</div>;
  return (
    <div className="feed">
      {cards.map((c) => <Card key={c.id} card={c} state={state} dispatch={dispatch} showCheck />)}
      <div className="feed-end">
        <p>End of this thread.</p>
        <span>Switch focus or level on the You tab to surface different cards.</span>
      </div>
    </div>
  );
}

function Browse({ state, dispatch, setTab }) {
  const [sel, setSel] = useState(null);
  if (sel) {
    const d = DISCIPLINES.find((x) => x.code === sel);
    if (d) return <Discipline d={d} state={state} dispatch={dispatch} setTab={setTab} onBack={() => setSel(null)} />;
  }
  const byDomain = {};
  DISCIPLINES.forEach((d) => { (byDomain[d.domain] = byDomain[d.domain] || []).push(d); });
  return (
    <div className="browse">
      <h1 className="page-title">Explore</h1>
      <p className="page-sub">Forty fields, each with a full syllabus. Open one to read its curriculum, then follow it into your feed.</p>
      {Object.keys(DOMAINS).map((dom) => (
        <section key={dom} className="dom-block">
          <h3 className="dom-label" style={{ color: hueColor(DOMAINS[dom].hue, 70) }}>{DOMAINS[dom].label}</h3>
          <div className="disc-grid">
            {(byDomain[dom] || []).map((d) => {
              const total = d.cards.length;
              const seen = d.cards.reduce((n, _c, i) => n + (state.seen[d.code + "-" + i] ? 1 : 0), 0);
              const pct = Math.round((seen / total) * 100);
              return (
                <button key={d.code} className="disc-card" style={{ "--dh": DOMAINS[dom].hue }}
                  onClick={() => setSel(d.code)}>
                  <span className="disc-card-top"><Avatar d={d} size={30} /><span className="disc-code">{d.code}</span></span>
                  <span className="disc-name">{d.name}</span>
                  <span className="bar"><i style={{ width: pct + "%" }} /></span>
                  <span className="disc-meta">{d.syllabus ? d.syllabus.modules.length + " modules · " : ""}{seen}/{total} posts</span>
                </button>
              );
            })}
          </div>
        </section>
      ))}
    </div>
  );
}

function Discipline({ d, state, dispatch, setTab, onBack }) {
  const dh = DOMAINS[d.domain].hue;
  const total = d.cards.length;
  const seen = d.cards.reduce((n, _c, i) => n + (state.seen[d.code + "-" + i] ? 1 : 0), 0);
  const pct = Math.round((seen / total) * 100);
  const cards = d.cards.map((c, i) => ({ id: d.code + "-" + i, disc: d, type: c.type, level: c.level, title: c.title, body: c.body }));
  const syl = d.syllabus;
  function focusFeed() { dispatch({ t: "focus", code: d.code }); setTab("feed"); }
  function saveAll() { d.cards.forEach((_c, i) => { const id = d.code + "-" + i; if (!state.saved[id]) dispatch({ t: "save", id: id }); }); }
  return (
    <div className="disc-detail" style={{ "--dh": dh }}>
      <button className="back" onClick={onBack}>‹ Explore</button>
      <header className="dd-head">
        <Avatar d={d} size={66} />
        <div className="dd-id">
          <h1 className="dd-name">{d.name}<span className="verified" title="Curated field">✓</span></h1>
          <span className="dd-handle">{discHandle(d)}</span>
          <span className="dd-meta">{DOMAINS[d.domain].label} · {total} posts · {pct}% read</span>
        </div>
      </header>
      <div className="bar dd-bar"><i style={{ width: pct + "%", background: "hsl(" + dh + " 60% 62%)" }} /></div>
      <div className="dd-actions">
        <button className="follow" onClick={focusFeed}>Focus in feed</button>
        <button className="ghost" onClick={saveAll}>Save all</button>
      </div>

      {syl && (
        <section className="syl">
          <h3 className="syl-h">Syllabus</h3>
          <p className="syl-overview">{syl.overview}</p>
          {syl.modules.map((m, i) => (
            <div key={i} className="mod">
              <span className="mod-n" style={{ color: "hsl(" + dh + " 65% 70%)", borderColor: "hsl(" + dh + " 55% 50% / .5)" }}>{i + 1}</span>
              <div className="mod-body">
                <div className="mod-t">{m.t}</div>
                <div className="mod-o">{m.o}</div>
                <div className="mod-k">Key thinkers · {m.k}</div>
              </div>
            </div>
          ))}
        </section>
      )}

      <section className="dd-posts">
        <h3 className="syl-h">Posts in this field</h3>
        {cards.map((c) => <Card key={c.id} card={c} state={state} dispatch={dispatch} showCheck />)}
      </section>
    </div>
  );
}

function Saved({ state, dispatch }) {
  const cards = ALL_CARDS.filter((c) => state.saved[c.id]);
  if (!cards.length) return <div className="empty">Nothing saved yet. Tap ☆ Save on any card.</div>;
  return (
    <div className="saved">
      <h1 className="page-title">Saved cards</h1>
      <p className="page-sub">{cards.length} card{cards.length === 1 ? "" : "s"} kept for revision.</p>
      {cards.map((c) => <Card key={c.id} card={c} state={state} dispatch={dispatch} />)}
    </div>
  );
}

const PROPOSAL_FIELDS = [
  { k: "title", label: "Working title", hint: "Concise, specific, signals the variables. Avoid 'A study of...'.", area: false },
  { k: "problem", label: "Problem statement", hint: "What gap or tension in the literature justifies this work? Two or three sentences.", area: true },
  { k: "question", label: "Research question(s)", hint: "Answerable, bounded. For a PhD, one primary question plus sub-questions.", area: true },
  { k: "aims", label: "Aims and objectives", hint: "Aim is the overall purpose. Objectives are the concrete, measurable steps.", area: true },
  { k: "gap", label: "Literature gap and contribution", hint: "What does the field get wrong or not know, and what will you add?", area: true },
  { k: "theory", label: "Theoretical framework", hint: "The lens through which you interpret. Name it; do not leave it implicit.", area: true },
  { k: "method", label: "Design and methodology", hint: "Paradigm, design, sampling, measures or materials, analysis plan. Justify each choice.", area: true },
  { k: "ethics", label: "Ethics and reflexivity", hint: "Risks, consent, data protection, positionality. UK: name your committee and framework.", area: true },
  { k: "timeline", label: "Timeline and feasibility", hint: "Phased plan against the funded duration. Flag the riskiest dependency.", area: true }
];

function Proposal({ state, dispatch }) {
  const p = state.proposal || {};
  const filled = PROPOSAL_FIELDS.filter((f) => (p[f.k] || "").trim().length > 0).length;

  function exportProposal() {
    let txt = "RESEARCH PROPOSAL — draft\n" + new Date().toLocaleString("en-GB") + "\n\n";
    PROPOSAL_FIELDS.forEach((f) => { txt += f.label.toUpperCase() + "\n" + ((p[f.k] || "").trim() || "[to write]") + "\n\n"; });
    const blob = new Blob([txt], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "research-proposal-draft.txt"; a.click();
  }

  return (
    <div className="proposal">
      <h1 className="page-title">Research proposal</h1>
      <p className="page-sub">The artefact that separates taught study from a doctorate. {filled}/{PROPOSAL_FIELDS.length} sections drafted. Saved on this device as you type.</p>
      <div className="prop-progress"><i style={{ width: Math.round(filled / PROPOSAL_FIELDS.length * 100) + "%" }} /></div>

      {PROPOSAL_FIELDS.map((f) => (
        <div key={f.k} className="field">
          <label>{f.label}</label>
          <span className="field-hint">{f.hint}</span>
          {f.area
            ? <textarea rows={3} value={p[f.k] || ""} onChange={(e) => dispatch({ t: "proposal", k: f.k, v: e.target.value })} />
            : <input value={p[f.k] || ""} onChange={(e) => dispatch({ t: "proposal", k: f.k, v: e.target.value })} />}
        </div>
      ))}

      <div className="prop-actions">
        <button className="ghost" onClick={exportProposal}>Export as text</button>
        <button className="ghost danger" onClick={() => { if (confirm("Clear the whole proposal draft?")) dispatch({ t: "proposal-clear" }); }}>Clear draft</button>
      </div>
    </div>
  );
}

function You({ state, dispatch }) {
  const seenCount = Object.keys(state.seen).length;
  const likedCount = Object.keys(state.liked).length;
  const savedCount = Object.keys(state.saved).length;

  let qTot = 0, qRight = 0;
  Object.values(state.quiz).forEach((r) => { qTot += r.total || 0; qRight += r.correct || 0; });
  const acc = qTot ? Math.round((qRight / qTot) * 100) : null;

  const ranked = DISCIPLINES.map((d) => {
    const seen = d.cards.reduce((n, _c, i) => n + (state.seen[d.code + "-" + i] ? 1 : 0), 0);
    return { d, ratio: seen / d.cards.length };
  }).sort((a, b) => a.ratio - b.ratio).slice(0, 3);

  function exportAll() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "cortex-progress.json"; a.click();
  }
  function importAll(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => { try { dispatch({ t: "replace", state: JSON.parse(r.result) }); } catch (err) { alert("Could not read that file."); } };
    r.readAsText(file);
  }

  return (
    <div className="you">
      <div className="profile">
        <span className="pf-avatar">You</span>
        <div>
          <h1 className="pf-name">Your study</h1>
          <span className="pf-handle">@you · postgraduate psychology</span>
        </div>
      </div>
      <div className="stats">
        <div className="stat"><b>{seenCount}</b><span>cards seen</span></div>
        <div className="stat"><b>{likedCount}</b><span>understood</span></div>
        <div className="stat"><b>{savedCount}</b><span>saved</span></div>
        <div className="stat"><b>{acc === null ? "–" : acc + "%"}</b><span>quiz accuracy</span></div>
      </div>

      <section className="panel">
        <h3>Level</h3>
        <p className="panel-sub">L7 is taught mastery, L8 is research frontier. Filter the feed to one or see both.</p>
        <div className="seg">
          {[["all", "Both"], ["7", "L7 only"], ["8", "L8 only"]].map(([v, lab]) => (
            <button key={v} className={"seg-btn" + (String(state.level) === v ? " on" : "")} onClick={() => dispatch({ t: "level", v })}>{lab}</button>
          ))}
        </div>
      </section>

      <section className="panel">
        <h3>Suggested next</h3>
        <p className="panel-sub">Your three least-explored areas. Breadth here means knowing the shape of fields adjacent to your own.</p>
        <div className="path">
          {ranked.map(({ d, ratio }) => (
            <button key={d.code} className="path-row" onClick={() => dispatch({ t: "focus", code: d.code })}>
              <span className="path-code">{d.code}</span>
              <span className="path-name">{d.name}</span>
              <span className="path-pct">{Math.round(ratio * 100)}%</span>
            </button>
          ))}
        </div>
        {state.focus && <p className="focus-note">Focus set on {DISCIPLINES.find(d => d.code === state.focus)?.name}. Open the Feed tab. <button className="link" onClick={() => dispatch({ t: "focus", code: null })}>Clear focus</button></p>}
      </section>

      <section className="panel">
        <h3>Backup</h3>
        <p className="panel-sub">Progress lives only on this device. Export to keep it.</p>
        <div className="prop-actions">
          <button className="ghost" onClick={exportAll}>Export progress</button>
          <label className="ghost file-btn">Import<input type="file" accept="application/json" onChange={importAll} hidden /></label>
          <button className="ghost danger" onClick={() => { if (confirm("Reset all progress on this device?")) dispatch({ t: "reset" }); }}>Reset</button>
        </div>
      </section>

      <p className="colophon">Cortex · postgraduate psychology · built from the Bella's Brain pattern, retuned for L7/L8.</p>
    </div>
  );
}

function Stories({ state, dispatch, setTab }) {
  const doms = Object.keys(DOMAINS);
  const active = state.domain;
  return (
    <div className="stories">
      <button className={"story" + (!active && !state.focus ? " on" : "")} onClick={() => dispatch({ t: "domain", code: null })}>
        <span className="story-av all">★</span><span className="story-lab">For you</span>
      </button>
      {doms.map((dom) => {
        const dh = DOMAINS[dom].hue; const on = active === dom;
        return (
          <button key={dom} className={"story" + (on ? " on" : "")} onClick={() => dispatch({ t: "domain", code: on ? null : dom })}>
            <span className="story-av" style={{ background: "linear-gradient(145deg, hsl(" + dh + " 55% 34%), hsl(" + dh + " 60% 16%))", borderColor: "hsl(" + dh + " 60% 60%)", color: "hsl(" + dh + " 72% 82%)" }}>{DOMAINS[dom].label.slice(0, 2)}</span>
            <span className="story-lab">{DOMAINS[dom].label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [state, setState] = useState(loadState);
  const [tab, setTab] = useState("feed");
  const feedRef = useRef(null);

  useEffect(() => { saveState(state); }, [state]);

  const dispatch = useCallback((a) => {
    setState((s) => {
      const n = { ...s };
      switch (a.t) {
        case "seen": n.seen = { ...s.seen, [a.id]: 1 }; break;
        case "like": n.liked = { ...s.liked }; if (n.liked[a.id]) delete n.liked[a.id]; else n.liked[a.id] = 1; break;
        case "save": n.saved = { ...s.saved }; if (n.saved[a.id]) delete n.saved[a.id]; else n.saved[a.id] = 1; break;
        case "quiz": {
          const cur = s.quiz[a.id] || { total: 0, correct: 0 };
          n.quiz = { ...s.quiz, [a.id]: { total: cur.total + 1, correct: cur.correct + (a.correct ? 1 : 0) } };
          break;
        }
        case "level": n.level = a.v; break;
        case "focus": n.focus = a.code; n.domain = null; break;
        case "domain": n.domain = a.code; n.focus = null; break;
        case "proposal": n.proposal = { ...s.proposal, [a.k]: a.v }; break;
        case "proposal-clear": n.proposal = {}; break;
        case "reset": return { ...defaultState };
        case "replace": return { ...defaultState, ...a.state };
        default: break;
      }
      return n;
    });
  }, []);

  const feedCards = useMemo(() => {
    let cards = ALL_CARDS;
    if (state.focus) cards = cards.filter((c) => c.disc.code === state.focus);
    else if (state.domain) cards = cards.filter((c) => c.disc.domain === state.domain);
    if (state.level === "7") cards = cards.filter((c) => c.level === 7);
    else if (state.level === "8") cards = cards.filter((c) => c.level === 8);
    return cards;
  }, [state.focus, state.domain, state.level]);

  useEffect(() => { if (feedRef.current) feedRef.current.scrollTop = 0; }, [state.focus, state.domain, state.level, tab]);

  const focusName = state.focus ? DISCIPLINES.find(d => d.code === state.focus)?.name : null;

  return (
    <div className="app">
      <div className="topbar">
        <div className="brand"><span className="mark">C</span><span className="word">Cortex</span></div>
        <div className="ctx">
          {tab === "feed" && (focusName
            ? <button className="pill" onClick={() => dispatch({ t: "focus", code: null })}>{focusName} ✕</button>
            : (state.domain ? <button className="pill" onClick={() => dispatch({ t: "domain", code: null })}>{DOMAINS[state.domain].label} ✕</button> : <span className="pill ghosted">For you</span>))}
        </div>
      </div>

      {tab === "feed" && <Stories state={state} dispatch={dispatch} setTab={setTab} />}
      <main ref={feedRef} className={"scroll" + (tab === "feed" ? " is-feed" : "")}>
        {tab === "feed" && <Feed cards={feedCards} state={state} dispatch={dispatch} />}
        {tab === "browse" && <Browse state={state} dispatch={dispatch} setTab={setTab} />}
        {tab === "saved" && <Saved state={state} dispatch={dispatch} />}
        {tab === "proposal" && <Proposal state={state} dispatch={dispatch} />}
        {tab === "you" && <You state={state} dispatch={dispatch} />}
      </main>

      <nav className="tabbar">
        {[["feed", "Feed", "▤"], ["browse", "Browse", "▦"], ["saved", "Saved", "★"], ["proposal", "Proposal", "✎"], ["you", "You", "◍"]].map(([k, lab, ic]) => (
          <button key={k} className={"tab" + (tab === k ? " on" : "")} onClick={() => setTab(k)}>
            <span className="tab-ic">{ic}</span><span className="tab-lab">{lab}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
<script>
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("./sw.js").catch(function(){})});}
</script>
</body>
